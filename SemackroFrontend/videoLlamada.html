<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMACKRO - Videollamada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* BOTÓN TELEFÓNICO */
        .phone-button-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            gap: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            color: #3366ff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .call-ready {
            text-align: center;
            color: #6c757d;
            margin-bottom: 20px;
        }

        .call-ready p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .call-ready span {
            color: #3366ff;
            font-weight: 600;
        }

        .phone-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3366ff 0%, #0052cc 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(51, 102, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .phone-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .phone-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(51, 102, 255, 0.5);
        }

        .phone-btn:active {
            transform: scale(0.95);
        }

        .phone-btn svg {
            width: 60px;
            height: 60px;
            z-index: 1;
        }

        /* INTERFAZ VIDEO LLAMADA */
        .video-call-interface {
            background: #000;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: none;
            position: relative;
            aspect-ratio: 9 / 16;
            max-height: 90vh;
        }

        .video-call-interface.active {
            display: flex;
            flex-direction: column;
        }

        .video-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            top: 0;
            left: 0;
            z-index: 1;
        }

        .video-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .remote-video-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            width: 100%;
            min-height: 300px;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .local-video-mini {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 110px;
            height: 130px;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 3px solid #3366ff;
            z-index: 3;
            box-shadow: 0 8px 25px rgba(51, 102, 255, 0.3);
        }

        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .call-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: white;
            display: none;
        }

        .call-info.active {
            display: block;
        }

        .call-info h2 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .call-info p {
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .call-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 3;
            flex-wrap: wrap;
        }

        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .control-btn:active {
            transform: translateY(-1px);
        }

        .control-btn svg {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .control-btn.end-call {
            background: rgba(244, 67, 54, 0.9);
            border: 1px solid rgba(244, 67, 54, 1);
            width: 75px;
            height: 75px;
        }

        .control-btn.end-call:hover {
            background: rgba(244, 67, 54, 1);
            box-shadow: 0 8px 25px rgba(244, 67, 54, 0.4);
        }

        .control-btn.active {
            background: rgba(51, 102, 255, 0.8);
            border: 1px solid rgba(51, 102, 255, 1);
            box-shadow: 0 0 15px rgba(51, 102, 255, 0.5);
        }

        .control-btn.active:hover {
            background: rgba(51, 102, 255, 0.95);
            transform: translateY(-3px);
        }

        /* Estado de la llamada */
        .call-header {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            color: white;
        }

        .call-header h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .call-header p {
            font-size: 13px;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .phone-btn {
                width: 100px;
                height: 100px;
            }

            .phone-btn svg {
                width: 50px;
                height: 50px;
            }

            .control-btn {
                width: 55px;
                height: 55px;
            }

            .control-btn.end-call {
                width: 65px;
                height: 65px;
            }
        }
    </style>
    <script>
        // Detectar si fue cargado en modo embed (iframe modal)
        (function () {
            try {
                const params = new URLSearchParams(location.search);
                if (params.get('embed') === '1') {
                    document.documentElement.classList.add('embedded-iframe');
                }
            } catch (e) { }
        })();
    </script>

    <style>
        /* Estilos que se aplican solo cuando la página se carga dentro del modal (embed=1) */
        html.embedded-iframe,
        html.embedded-iframe body {
            height: 100%;
            min-height: 100%;
            background: transparent;
            display: block;
            padding: 0;
        }

        html.embedded-iframe .container {
            max-width: 100%;
            width: 100%;
            padding: 12px 18px;
        }

        /* Hacer que la interfaz de llamada aproveche el alto disponible dentro del iframe */
        html.embedded-iframe .video-call-interface {
            display: flex !important;
            flex-direction: column !important;
            width: 100% !important;
            height: calc(100vh - 24px) !important;
            max-height: none !important;
            aspect-ratio: auto !important;
            border-radius: 12px !important;
            margin: 6px auto !important;
        }

        html.embedded-iframe .video-content {
            padding: 18px !important;
        }

        html.embedded-iframe .remote-video-container {
            min-height: calc(100% - 140px) !important;
        }

        html.embedded-iframe .local-video-mini {
            width: 140px !important;
            height: 120px !important;
            top: 18px !important;
            right: 18px !important;
        }

        html.embedded-iframe .call-controls {
            position: absolute !important;
            left: 18px !important;
            right: 18px !important;
            bottom: 18px !important;
            width: auto !important;
            justify-content: center !important;
        }
    </style>
</head>

<body>
    <!-- Configuración de entorno -->
    <script src="config.js"></script>
    <!-- Cargar cliente Socket.io desde CDN HTTPS para cumplir CSP -->
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <div class="container">
        <!-- BOTÓN TELEFÓNICO eliminado; la UI de inicio ahora la controla el host (iframe embed) -->

        <!-- INTERFAZ VIDEO LLAMADA -->
        <div class="video-call-interface" id="videoCallInterface">
            <div class="video-background"></div>

            <div class="call-header">
                <h3 id="contactName">Contacto</h3>
                <p id="callStatus">Conectando...</p>
            </div>

            <div class="video-content">
                <div class="remote-video-container">
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>

                <div class="local-video-mini">
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>

                <div class="call-info" id="callInfo">
                    <h2>En espera de conexión</h2>
                    <p id="callDuration">0:00</p>
                </div>
            </div>

            <div class="call-controls">
                <button class="control-btn active" id="micBtn" onclick="toggleMic()" title="Micrófono">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
                        <path fill="currentColor"
                            d="M512 128a128 128 0 0 0-128 128v256a128 128 0 1 0 256 0V256a128 128 0 0 0-128-128m0-64a192 192 0 0 1 192 192v256a192 192 0 1 1-384 0V256A192 192 0 0 1 512 64m-32 832v-64a288 288 0 0 1-288-288v-32a32 32 0 0 1 64 0v32a224 224 0 0 0 224 224h64a224 224 0 0 0 224-224v-32a32 32 0 1 1 64 0v32a288 288 0 0 1-288 288v64h64a32 32 0 1 1 0 64H416a32 32 0 1 1 0-64z" />
                    </svg>
                </button>
                <button class="control-btn active" id="videoBtn" onclick="toggleCamera()" title="Cámara">
                    <svg viewBox="0 0 24 24">
                        <path d="M23 7l-7 5 7 5V7z" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                    </svg>
                </button>
                <button class="control-btn" id="speakerBtn" onclick="toggleSpeaker()" title="Altavoz">
                    <svg viewBox="0 0 24 24">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                        <path d="M15.54 8.46a7 7 0 0 1 0 9.9M19.07 4.93a11 11 0 0 1 0 15.66" />
                    </svg>
                </button>
                <button class="control-btn end-call" onclick="endCall()" title="Terminar llamada">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                            stroke="none" fill="currentColor" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Backend URL y Socket.io cliente para señalización en tiempo real
        const BACKEND_URL = window.APP_CONFIG ? window.APP_CONFIG.BACKEND_URL : 'https://SEMACKRO.duckdns.org';

        // Control de throttling para ICE candidates
        let _candidateBuffer = [];
        let _candidateSendTimer = null;
        const CANDIDATE_SEND_DELAY = 2000; // Agrupar candidates durante 2 segundos
        const MAX_CANDIDATES_TO_SEND = 5; // Máximo 5 candidates por envío

        // Función para enviar candidates con throttling
        function sendCandidateThrottled(candidate) {
            _candidateBuffer.push(candidate);
            console.log(`[ICE] Candidate buffered (${_candidateBuffer.length} in buffer)`);

            // Si el buffer alcanza el máximo, enviar inmediatamente
            if (_candidateBuffer.length >= MAX_CANDIDATES_TO_SEND) {
                flushCandidateBuffer();
                return;
            }

            // Si no hay timer activo, programar envío
            if (!_candidateSendTimer) {
                _candidateSendTimer = setTimeout(() => {
                    flushCandidateBuffer();
                }, CANDIDATE_SEND_DELAY);
            }
        }

        // Enviar todos los candidates del buffer
        async function flushCandidateBuffer() {
            if (_candidateSendTimer) {
                clearTimeout(_candidateSendTimer);
                _candidateSendTimer = null;
            }

            if (_candidateBuffer.length === 0) return;

            // Tomar solo los primeros MAX_CANDIDATES_TO_SEND
            const candidatesToSend = _candidateBuffer.splice(0, MAX_CANDIDATES_TO_SEND);
            console.log(`[ICE] Flushing ${candidatesToSend.length} candidates`);

            // Enviar el primer candidate (los demás se descartan por simplicidad)
            // En producción podrías enviarlos todos o el mejor
            const bestCandidate = candidatesToSend[0];

            try {
                await sendSignalViaPolling('candidate', {
                    candidate: JSON.stringify(bestCandidate)
                });
                console.log('[ICE] Candidate sent successfully');
            } catch (e) {
                console.error('[ERROR] Failed to send candidate:', e);
            }

            // Si quedan más en el buffer, programar otro envío
            if (_candidateBuffer.length > 0) {
                _candidateSendTimer = setTimeout(() => {
                    flushCandidateBuffer();
                }, CANDIDATE_SEND_DELAY);
            }
        }
        let socket = null;
        try { if (typeof io === 'function') { socket = io(BACKEND_URL); } } catch (e) { console.warn('Socket.io client not available', e); }

        // Generar un userId en carga para registrar el socket (útil para pruebas locales)
        if (!window.currentUserIdGlobal) {
            window.currentUserIdGlobal = 'user_' + Math.random().toString(36).substr(2, 9);
        }
        let localStream = null;

        // Registrar automáticamente este cliente con su userId cuando socket se conecte
        if (socket) {
            socket.on('connect', () => {
                try {
                    if (!currentUserId) currentUserId = window.currentUserIdGlobal;
                    if (currentUserId) socket.emit('register', { userId: currentUserId });
                } catch (e) { /* ignore */ }
            });
        }
        let peerConnection = null;
        let currentUserId = null;
        let currentRoomId = null;
        let callStartTime = null;
        let callDurationInterval = null;
        let micEnabled = true;
        let cameraEnabled = true;
        let speakerEnabled = false;

        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function generateUserId() {
            return 'user_' + Math.random().toString(36).substr(2, 9);
        }

        function generateRoomId() {
            return 'room_' + Math.random().toString(36).substr(2, 9);
        }

        // Helper: obtener receiver_id de la URL
        function getReceiverIdFromUrl() {
            try {
                const params = new URLSearchParams(location.search);
                return params.get('receiver_id') || null;
            } catch (e) {
                return null;
            }
        }

        // Helper: obtener sender_id de la URL  
        function getSenderIdFromUrl() {
            try {
                const params = new URLSearchParams(location.search);
                return params.get('sender_id') || currentUserId;
            } catch (e) {
                return currentUserId;
            }
        }

        // Enviar señal usando call-signals API (polling puro)
        async function sendSignalViaPolling(signalType, payloadData, maxRetries = 5, delayMs = 300) {
            const senderId = getSenderIdFromUrl();
            const receiverId = getReceiverIdFromUrl();

            const payload = {
                id_mensaje: window.callMessageId || null,
                room_id: currentRoomId,
                signal_type: signalType,
                sender_id: senderId,
                receiver_id: receiverId,
                payload: JSON.stringify(payloadData)
            };

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const resp = await fetch(BACKEND_URL + '/api/call-signals/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await resp.json();

                    if (!resp.ok) {
                        if (attempt === maxRetries) {
                            throw new Error(`Failed after ${maxRetries} attempts`);
                        }
                        await new Promise(r => setTimeout(r, delayMs * attempt));
                        continue;
                    }

                    if (signalType === 'answer') {
                        console.log(`[ANSWER] ✅ SENT SUCCESSFULLY (attempt ${attempt})`);
                    }
                    return result;
                } catch (error) {
                    if (attempt === maxRetries) {
                        if (signalType !== 'call_ended') { // Solo loguear errores críticos
                            console.error(`[ERROR] ${signalType} failed after ${maxRetries} attempts`);
                        }
                        throw error;
                    }
                    await new Promise(r => setTimeout(r, delayMs * attempt));
                }
            }
        }

        async function startCall() {
            // si no hay currentUserId asignado, usar el generado global y registrar
            if (!currentUserId) currentUserId = window.currentUserIdGlobal || generateUserId();

            // Si la iframe recibió roomId o id_mensaje como query params, respetarlos (created by parent)
            try {
                const params = new URLSearchParams(location.search);
                const urlRoom = params.get('roomId');
                const urlIdMensaje = params.get('id_mensaje') || params.get('idMensaje');
                if (urlRoom) currentRoomId = urlRoom; else currentRoomId = generateRoomId();
                if (urlIdMensaje) window.callMessageId = urlIdMensaje;
            } catch (e) {
                currentRoomId = generateRoomId();
            }

            // registrar userId en socket para que el server pueda targetear este usuario
            try { if (socket && currentUserId) socket.emit('register', { userId: currentUserId }); } catch (e) { }

            // unir sala en socket.io
            try { if (socket && currentRoomId) socket.emit('join', currentRoomId); } catch (e) { }

            // IMPORTANTE: Detener cualquier stream previo que pueda estar activo
            if (localStream) {
                console.log('[CLEANUP] Deteniendo stream previo...');
                localStream.getTracks().forEach(track => {
                    track.stop();
                    console.log('[CLEANUP] Track detenido:', track.kind, track.label);
                });
                localStream = null;
            }

            // Esperar un momento para que los dispositivos se liberen
            await new Promise(resolve => setTimeout(resolve, 500));

            // Listar dispositivos disponibles ANTES de solicitar permisos
            let videoDevicesCount = 0;
            let audioDevicesCount = 0;
            try {
                const devicesBeforePermission = await navigator.mediaDevices.enumerateDevices();
                videoDevicesCount = devicesBeforePermission.filter(d => d.kind === 'videoinput').length;
                audioDevicesCount = devicesBeforePermission.filter(d => d.kind === 'audioinput').length;
                console.log('[DEVICES] ANTES de permisos - Camaras:', videoDevicesCount, 'Microfonos:', audioDevicesCount);
            } catch (e) {
                console.warn('[DEVICES] No se pudo enumerar dispositivos antes de permisos:', e);
            }

            // Si no hay dispositivos detectados, solicitar permisos primero
            if (videoDevicesCount === 0 && audioDevicesCount === 0) {
                console.log('[PERMISSION] No se detectaron dispositivos, solicitando permisos...');
                try {
                    // Solicitar permisos con un getUserMedia temporal
                    const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    console.log('[PERMISSION] Permisos concedidos, deteniendo stream temporal');
                    tempStream.getTracks().forEach(track => track.stop());

                    // Esperar un poco y volver a enumerar
                    await new Promise(resolve => setTimeout(resolve, 500));

                    const devicesAfterPermission = await navigator.mediaDevices.enumerateDevices();
                    videoDevicesCount = devicesAfterPermission.filter(d => d.kind === 'videoinput').length;
                    audioDevicesCount = devicesAfterPermission.filter(d => d.kind === 'audioinput').length;
                    console.log('[DEVICES] DESPUES de permisos - Camaras:', videoDevicesCount, 'Microfonos:', audioDevicesCount);

                    devicesAfterPermission.filter(d => d.kind === 'videoinput').forEach((d, i) =>
                        console.log(`  Camara ${i + 1}:`, d.label || d.deviceId));
                    devicesAfterPermission.filter(d => d.kind === 'audioinput').forEach((d, i) =>
                        console.log(`  Microfono ${i + 1}:`, d.label || d.deviceId));
                } catch (permError) {
                    console.error('[PERMISSION] Error al solicitar permisos:', permError.name, permError.message);
                }
            } else {
                // Ya hay dispositivos detectados, mostrarlos
                const devices = await navigator.mediaDevices.enumerateDevices();
                devices.filter(d => d.kind === 'videoinput').forEach((d, i) =>
                    console.log(`  Camara ${i + 1}:`, d.label || d.deviceId));
                devices.filter(d => d.kind === 'audioinput').forEach((d, i) =>
                    console.log(`  Microfono ${i + 1}:`, d.label || d.deviceId));
            }

            try {
                // Intentar con configuracion simple primero
                try {
                    console.log('[MEDIA] Intentando obtener video y audio...');
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: true
                    });
                    console.log('[MEDIA] Exito! Video y audio obtenidos');
                    console.log('[MEDIA] Video tracks:', localStream.getVideoTracks().length);
                    console.log('[MEDIA] Audio tracks:', localStream.getAudioTracks().length);
                } catch (firstError) {
                    console.error('[MEDIA] Error en primer intento:', firstError.name, '-', firstError.message);

                    // Si es error de permisos, informar al usuario
                    if (firstError.name === 'NotAllowedError' || firstError.name === 'PermissionDeniedError') {
                        alert('Debes permitir el acceso a la camara y microfono en tu navegador.\n\nHaz clic en el icono de candado en la barra de direcciones y permite el acceso.');
                        throw firstError;
                    }

                    // Si es NotFoundError, puede ser que otra pestaña esté usando la cámara
                    if (firstError.name === 'NotFoundError') {
                        console.error('[MEDIA] NotFoundError detectado - Posibles causas:');
                        console.error('  1. Otra pestaña o aplicacion esta usando la camara');
                        console.error('  2. La camara esta desconectada fisicamente');
                        console.error('  3. Problema con drivers del dispositivo');
                        alert('No se pudo acceder a la camara.\n\n' +
                            'CIERRA otras pestanas del navegador que puedan estar usando la camara\n' +
                            '(incluyendo pestanas en modo incognito)\n\n' +
                            'Luego intenta de nuevo.');
                        throw firstError;
                    }

                    // Intentar solo video
                    try {
                        console.log('[MEDIA] Intentando solo video...');
                        localStream = await navigator.mediaDevices.getUserMedia({ video: true });
                        console.log('[MEDIA] Solo video obtenido correctamente');
                        alert('No se pudo acceder al microfono. La llamada continuara solo con video.');
                    } catch (secondError) {
                        console.error('[MEDIA] Error obteniendo solo video:', secondError.name, '-', secondError.message);

                        // Verificar NotFoundError en el segundo intento tambien
                        if (secondError.name === 'NotFoundError') {
                            alert('La camara no esta disponible.\n\n' +
                                'Verifica que:\n' +
                                '- No hay otras pestanas usandola\n' +
                                '- Esta conectada correctamente\n' +
                                '- No esta bloqueada por otra aplicacion');
                            throw secondError;
                        }

                        // Intentar solo audio
                        try {
                            console.log('[MEDIA] Intentando solo audio...');
                            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            console.log('[MEDIA] Solo audio obtenido correctamente');
                            alert('No se pudo acceder a la camara. La llamada continuara solo con audio.');
                        } catch (thirdError) {
                            console.error('[MEDIA] Error obteniendo solo audio:', thirdError.name, '-', thirdError.message);

                            // Crear stream vacio para permitir continuar
                            localStream = new MediaStream();
                            console.log('[MEDIA] Continuando sin dispositivos multimedia');

                            if (thirdError.name === 'NotFoundError') {
                                alert('No se encontro camara ni microfono conectado.\nPodras ver y escuchar a la otra persona.');
                            } else if (thirdError.name === 'NotAllowedError' || thirdError.name === 'PermissionDeniedError') {
                                alert('Permisos denegados.\nPodras ver y escuchar a la otra persona.');
                            }
                        }
                    }
                }

                // Asignar video local si hay tracks de video
                if (localStream && localStream.getVideoTracks().length > 0) {
                    const localVideoEl = document.getElementById('localVideo');
                    localVideoEl.srcObject = localStream;
                    console.log('[MEDIA] Video local asignado correctamente');

                    // Forzar reproduccion
                    localVideoEl.play().catch(e => console.warn('[MEDIA] Error al reproducir video local:', e));
                } else {
                    console.log('[MEDIA] Sin video tracks disponibles');
                }
                const _pc = document.getElementById('phoneContainer');
                if (_pc) _pc.style.display = 'none';
                document.getElementById('videoCallInterface').classList.add('active');

                callStartTime = Date.now();
                updateCallDuration();
                callDurationInterval = setInterval(updateCallDuration, 1000);

                peerConnection = new RTCPeerConnection(iceServers);

                // Si no hay video tracks, agregar un track negro para poder reemplazarlo después
                const hasVideo = localStream.getVideoTracks().length > 0;
                if (!hasVideo) {
                    console.log('[WEBRTC] No hay video tracks, agregando track negro para permitir activacion posterior');
                    const canvas = document.createElement('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const blackStream = canvas.captureStream();
                    const blackTrack = blackStream.getVideoTracks()[0];
                    localStream.addTrack(blackTrack);
                    cameraEnabled = false; // Marcar cámara como desactivada
                    document.getElementById('videoBtn')?.classList.remove('active');
                }

                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    console.log('[WEBRTC] Track agregado:', track.kind, track.label || 'sin nombre');
                });

                peerConnection.ontrack = (event) => {
                    const remoteVid = document.getElementById('remoteVideo');
                    remoteVid.srcObject = event.streams[0];
                    document.getElementById('callInfo').classList.remove('active');
                    document.getElementById('callStatus').textContent = 'Llamada en curso';

                    // Monitorear el track para detectar cuando se vuelve inactivo (cámara apagada)
                    event.track.onended = () => {
                        console.log('[REMOTE] Track ended, showing black screen');
                        if (event.track.kind === 'video') {
                            remoteVid.srcObject = null;
                            remoteVid.style.backgroundColor = '#000000';
                        }
                    };

                    event.track.onmute = () => {
                        console.log('[REMOTE] Track muted, showing black screen');
                        if (event.track.kind === 'video') {
                            remoteVid.srcObject = null;
                            remoteVid.style.backgroundColor = '#000000';

                    event.track.onunmute = () => {

                        if (event.track.kind === 'video') {
                            remoteVid.style.backgroundColor = 'transparent';

                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);


                // Enviar candidates usando call-signals con throttling
                peerConnection.onicecandidate = function (event) {
                    if (event.candidate) {
                        console.log('[ICE] New ICE candidate generated');
                        sendCandidateThrottled(event.candidate);

                    }

                // Enviar offer usando call-signals
                try {
                    const receiverId = getReceiverIdFromUrl();

                        offer: JSON.stringify(offer)

                // Iniciar polling para answer y candidates (ambos en pollForCandidates)
                pollForCandidates(currentRoomId);

                document.getElementById('callInfo').classList.add('active');

                alert('Error al iniciar la llamada: ' + error.message);

        function updateCallDuration() {
            if (!callStartTime) return;
            const seconds = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('callDuration').textContent =
                mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        async function toggleMic() {
            micEnabled = !micEnabled;
            const micBtnEl = document.getElementById('micBtn');
            if (!localStream) {
                // nothing to do yet
                micBtnEl.classList.toggle('active', micEnabled);
                return;
            }

            // If disabling mic: stop tracks and inform peer by replacing sender's track with null
            if (!micEnabled) {
                try {
                    const audioTracks = localStream.getAudioTracks();
                    audioTracks.forEach(t => { t.stop(); localStream.removeTrack(t); });
                    if (peerConnection) {
                        const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
                        if (sender && typeof sender.replaceTrack === 'function') {
                            sender.replaceTrack(null);
                        }
                    }
                } catch (err) { console.error('Error stopping audio tracks', err); }
            } else {
                // Enabling mic: request a new audio track and replace/add to the peer connection
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const newTrack = newStream.getAudioTracks()[0];
                    if (newTrack) {
                        if (!localStream) localStream = new MediaStream();
                        localStream.addTrack(newTrack);
                        // replace sender's track if exists
                        if (peerConnection) {
                            const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
                            if (sender && typeof sender.replaceTrack === 'function') {
                                await sender.replaceTrack(newTrack);
                            } else {
                                peerConnection.addTrack(newTrack, localStream);
                            }
                        }
                    }
                } catch (err) { console.error('Error enabling microphone', err); }
            }

            micBtnEl.classList.toggle('active', micEnabled);
        }

        async function toggleCamera() {
            cameraEnabled = !cameraEnabled;
            const videoBtnEl = document.getElementById('videoBtn');
            if (!localStream) {
                videoBtnEl.classList.toggle('active', cameraEnabled);
                return;
            }

            if (!cameraEnabled) {
                try {
                    const videoTracks = localStream.getVideoTracks();
                    videoTracks.forEach(t => { t.stop(); localStream.removeTrack(t); });

                    // Reemplazar con track negro en la conexión peer
                    if (peerConnection) {
                        // CORREGIDO: Buscar el sender que tiene un track de video O que originalmente era para video
                        const sender = peerConnection.getSenders().find(s =>
                            (s.track && s.track.kind === 'video') ||
                            (s.track === null && s.track !== undefined)
                        );

                        // Si no lo encontramos así, buscar por el transceiver
                        let videoSender = sender;
                        if (!videoSender) {
                            const transceivers = peerConnection.getTransceivers();
                            const videoTransceiver = transceivers.find(t =>
                                t.sender && (t.sender.track?.kind === 'video' || t.direction.includes('send'))
                            );
                            if (videoTransceiver) videoSender = videoTransceiver.sender;
                        }

                        if (videoSender && typeof videoSender.replaceTrack === 'function') {
                            // Crear un canvas negro para enviar al receptor
                            const canvas = document.createElement('canvas');
                            canvas.width = 640;
                            canvas.height = 480;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#000000';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            const blackStream = canvas.captureStream();
                            const blackTrack = blackStream.getVideoTracks()[0];

                            await videoSender.replaceTrack(blackTrack);
                            console.log('[CAMERA] Replaced with black screen for remote viewer');
                        }
                    }

                    // Mostrar pantalla negra en video local
                    const localVid = document.getElementById('localVideo');
                    if (localVid) {
                        localVid.srcObject = null;
                        localVid.style.backgroundColor = '#000000';
                    }
                } catch (err) { console.error('Error stopping video tracks', err); }
            } else {
                // habilitar cámara: solicitar nueva pista y reemplazar en la conexión
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } } });
                    const newTrack = newStream.getVideoTracks()[0];
                    if (newTrack) {
                        if (!localStream) localStream = new MediaStream();
                        localStream.addTrack(newTrack);

                        // Restaurar video local
                        const localVid = document.getElementById('localVideo');
                        if (localVid) {
                            localVid.style.backgroundColor = 'transparent';
                            localVid.srcObject = localStream;
                        }

                        if (peerConnection) {
                            // CORREGIDO: Buscar específicamente el sender de video
                            let videoSender = peerConnection.getSenders().find(s =>
                                s.track && s.track.kind === 'video'
                            );

                            // Si no hay sender con track de video, buscar en transceivers
                            if (!videoSender) {
                                const transceivers = peerConnection.getTransceivers();
                                const videoTransceiver = transceivers.find(t =>
                                    t.sender && t.receiver &&
                                    (t.receiver.track?.kind === 'video' || t.direction.includes('video') || t.mid)
                                );
                                if (videoTransceiver) {
                                    videoSender = videoTransceiver.sender;
                                }
                            }

                            if (videoSender && typeof videoSender.replaceTrack === 'function') {
                                await videoSender.replaceTrack(newTrack);
                                console.log('[CAMERA] Camera re-enabled and track replaced successfully');

                                // Forzar renegociación para asegurar que el receptor reciba el nuevo track
                                try {
                                    const offer = await peerConnection.createOffer();
                                    await peerConnection.setLocalDescription(offer);
                                    console.log('[CAMERA] Renegotiating connection to send new video track');

                                    // Enviar nueva offer via polling
                                    await sendSignalViaPolling('offer', {
                                        offer: JSON.stringify(offer)
                                    });
                                } catch (renegErr) {
                                    console.error('[CAMERA] Error during renegotiation:', renegErr);
                                }
                            } else {
                                console.log('[CAMERA] No video sender found, adding new track and renegotiating');
                                peerConnection.addTrack(newTrack, localStream);

                                // Renegociar después de agregar track
                                try {
                                    const offer = await peerConnection.createOffer();
                                    await peerConnection.setLocalDescription(offer);
                                    await sendSignalViaPolling('offer', {
                                        offer: JSON.stringify(offer)
                                    });
                                    console.log('[CAMERA] New track added and connection renegotiated');
                                } catch (renegErr) {
                                    console.error('[CAMERA] Error during renegotiation:', renegErr);
                                }
                            }
                        }
                    }
                } catch (err) { console.error('Error enabling camera', err); }
            }

            videoBtnEl.classList.toggle('active', cameraEnabled);
        }

        function endCall() {
            console.log('[CLEANUP] Starting endCall...');
            const roomIdToEnd = currentRoomId;

            // Enviar señal de finalización (silenciosamente, sin romper el flujo)
            if (roomIdToEnd) {
                sendSignalViaPolling('call_ended', { reason: 'user_hangup' }, 1, 100)
                    .then(() => console.log('[CLEANUP] call_ended sent'))
                    .catch(() => { }); // Ignorar errores de red
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            if (callDurationInterval) {
                clearInterval(callDurationInterval);
            }

            // Detener polling
            if (_candidatesPollHandle) {
                clearInterval(_candidatesPollHandle);
                _candidatesPollHandle = null;
            }

            // Limpiar buffer de candidates
            if (_candidateSendTimer) {
                clearTimeout(_candidateSendTimer);
                _candidateSendTimer = null;
            }
            _candidateBuffer = [];
            console.log('[ICE] Candidate buffer cleared');

            document.getElementById('videoCallInterface').classList.remove('active');
            const _pc_end = document.getElementById('phoneContainer');
            if (_pc_end) _pc_end.style.display = 'flex';
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;

            // Avisar al padre (host) para que cierre el modal
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ cmd: 'endCall', roomId: currentRoomId }, '*');
                }
            } catch (e) { /* ignore */ }

            saveCallLog('ended', roomIdToEnd);
            currentRoomId = null; // Resetear para evitar conflictos en próxima llamada
            console.log('[CLEANUP] endCall completed');
        }

        async function saveCallLog(action, roomId) {
            if (!roomId) return;
            try {
                const resp = await fetch(BACKEND_URL + '/api/videollamadas/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: roomId, status: action })
                });
                if (!resp.ok) {
                    console.warn('[LOG] Status update failed:', resp.status);
                }
            } catch (error) {
                // Ignorar errores de red silenciosamente
            }
        }

        // REMOVED: saveCandidateToBackend - ahora usamos sendSignalViaPolling('candidate')

        // Poll para candidatos entrantes usando call-signals
        const _addedCandidateIds = new Set();
        let _candidatesPollHandle = null;
        async function pollForCandidates(roomId) {
            // limpiar poll previo
            if (_candidatesPollHandle) clearInterval(_candidatesPollHandle);

            const myUserId = getSenderIdFromUrl();

            _candidatesPollHandle = setInterval(async () => {
                try {
                    // Obtener señales de la sala (candidates y otras señales)
                    const resp = await fetch(BACKEND_URL + `/api/call-signals/room/${roomId}/${myUserId}`);
                    const json = await resp.json();
                    const signals = (json && json.data) ? json.data : [];

                    if (signals.length > 0) {
                        console.log(`[POLL] Received ${signals.length} signals for room ${roomId}`);
                    }

                    for (const signal of signals) {
                        if (!signal.id) continue;
                        if (_addedCandidateIds.has(signal.id)) continue;

                        // Procesar solo candidates del otro usuario
                        if (signal.signal_type === 'candidate' && signal.sender_id != myUserId) {
                            try {
                                const payload = typeof signal.payload === 'string' ? JSON.parse(signal.payload) : signal.payload;
                                const candObj = typeof payload.candidate === 'string' ? JSON.parse(payload.candidate) : payload.candidate;

                                if (peerConnection && candObj) {
                                    await peerConnection.addIceCandidate(new RTCIceCandidate(candObj));
                                    console.log('ICE candidate added from signal', signal.id);
                                }
                                _addedCandidateIds.add(signal.id);
                            } catch (e) { console.warn('addIceCandidate failed', e); }
                        }

                        // Procesar answer si llega
                        if (signal.signal_type === 'answer' && signal.sender_id != myUserId) {
                            try {
                                const payload = typeof signal.payload === 'string' ? JSON.parse(signal.payload) : signal.payload;
                                const answerObj = typeof payload.answer === 'string' ? JSON.parse(payload.answer) : payload.answer;

                                if (peerConnection && answerObj && peerConnection.signalingState !== 'stable') {
                                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answerObj));
                                    console.log('Answer received and set');
                                }
                                _addedCandidateIds.add(signal.id);
                            } catch (e) { console.warn('setRemoteDescription answer failed', e); }
                        }

                        // Detectar cuando el otro usuario finaliza la llamada
                        if (signal.signal_type === 'call_ended' && signal.sender_id != myUserId) {
                            console.log('[CALL] Remote user ended the call');
                            _addedCandidateIds.add(signal.id);
                            // Cerrar la llamada en este lado tambi�n
                            endCall();
                            return; // Salir del loop
                        }

                        // Detectar cuando el otro usuario rechaza la llamada
                        if (signal.signal_type === 'call_rejected' && signal.sender_id != myUserId) {
                            console.log('[CALL] Remote user rejected the call');
                            _addedCandidateIds.add(signal.id);
                            // Cerrar la llamada en este lado tambi�n
                            endCall();
                            return; // Salir del loop
                        }
                    }
                } catch (e) { /* ignore poll errors */ }
            }, 1000);
        }

        // --- Handlers de señalización Socket.io (recibir oferta/respuesta/candidatos en tiempo real)
        if (typeof socket !== 'undefined' && socket) {
            // Cuando recibimos una offer remota, no contestamos automáticamente.
            // En lugar de ello, avisamos al padre para que muestre la UI de "llamada entrante"
            // y espere a que el usuario acepte o rechace.
            let _pendingRemoteOffer = null;
            let _pendingRemoteMeta = null;
            socket.on('offer', (data) => {
                try {
                    if (!data || !data.roomId || !data.offer) return;
                    _pendingRemoteOffer = (typeof data.offer === 'string') ? JSON.parse(data.offer) : data.offer;
                    _pendingRemoteMeta = { roomId: data.roomId, callerId: data.callerId || null, callerName: data.callerName || null };
                    // avisar al padre (host) para que muestre UI de llamada entrante
                    try {
                        if (window.parent && window.parent !== window) {
                            window.parent.postMessage({ cmd: 'incomingOffer', roomId: _pendingRemoteMeta.roomId, callerId: _pendingRemoteMeta.callerId, callerName: _pendingRemoteMeta.callerName }, '*');
                        }
                    } catch (e) {/*ignore*/ }
                } catch (err) { console.error('Error processing incoming offer', err); }
            });

            // Escuchar mensajes del padre (aceptar/rechazar llamada)
            window.addEventListener('message', async (e) => {

                    const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                    if (!data) return;
                    // Si el padre envía la offer directamente (por postMessage), la guardamos como pending
                    if (data.cmd === 'incomingOffer' && data.offer) {

                            _pendingRemoteMeta = { roomId: data.roomId || null, callerId: data.callerId || null, callerName: data.callerName || null };
                            // si el padre pasó id_mensaje, guardarlo para futuras persistencias

                            // no contestamos automáticamente; esperamos acceptCall
                        } catch (err) { console.warn('incomingOffer parse failed', err); }
                        return;
                    }
                    if (data.cmd === 'acceptCall') {
                        // crear RTCPeerConnection y responder
                        if (!_pendingRemoteOffer || !_pendingRemoteMeta) return;
                        try {
                            currentRoomId = _pendingRemoteMeta.roomId;
                            // si el padre envió id_mensaje en el accept, preferirlo
                            if (data.id_mensaje) window.callMessageId = data.id_mensaje || window.callMessageId;
                            if (!currentUserId) currentUserId = generateUserId();

                                    } else if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                                        alert('Permisos denegados.\nPermite el acceso a camara y microfono en la configuracion del navegador.');
                                    }

                                    // Intentar solo audio como fallback
                                    try {
                                        console.log('[ACCEPT] Intentando solo audio...');
                                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                                        console.log('[ACCEPT] Solo audio obtenido');
                                    } catch (audioErr) {
                                        console.error('[ACCEPT] No se pudo obtener ni video ni audio:', audioErr.name);
                                        // Crear stream vacío para permitir continuar
                                        localStream = new MediaStream();
                                    }
                                }
                            }

                            // Si no hay video tracks, agregar un track negro para poder reemplazarlo después
                            const hasVideo = localStream.getVideoTracks().length > 0;
                            if (!hasVideo) {
                                console.log('[ACCEPT] No hay video tracks, agregando track negro');
                                const canvas = document.createElement('canvas');
                                canvas.width = 640;
                                canvas.height = 480;
                                const ctx = canvas.getContext('2d');
                                ctx.fillStyle = '#000000';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                const blackStream = canvas.captureStream();
                                const blackTrack = blackStream.getVideoTracks()[0];
                                localStream.addTrack(blackTrack);
                                cameraEnabled = false;
                                document.getElementById('videoBtn')?.classList.remove('active');
                            }

                            peerConnection = new RTCPeerConnection(iceServers);
                            if (localStream) {
                                localStream.getTracks().forEach(t => {
                                    peerConnection.addTrack(t, localStream);
                                    console.log('[ACCEPT] Track agregado:', t.kind, t.label || 'sin nombre');
                                });
                            }
                            peerConnection.ontrack = (event) => {
                                console.log('[VIDEO] REMOTE STREAM RECEIVED!', event.streams[0]);
                                const remoteVid = document.getElementById('remoteVideo');
                                remoteVid.srcObject = event.streams[0];
                                document.getElementById('callInfo').classList.remove('active');
                                document.getElementById('callStatus').textContent = 'Llamada en curso';

                                // Monitorear el track para detectar cuando se vuelve inactivo
                                event.track.onended = () => {
                                    console.log('[REMOTE] Track ended, showing black screen');
                                    if (event.track.kind === 'video') {
                                        remoteVid.srcObject = null;
                                        remoteVid.style.backgroundColor = '#000000';
                                    }
                                };

                                event.track.onmute = () => {
                                    console.log('[REMOTE] Track muted, showing black screen');
                                    if (event.track.kind === 'video') {
                                        remoteVid.srcObject = null;
                                        remoteVid.style.backgroundColor = '#000000';
                                    }
                                };

                                event.track.onunmute = () => {
                                    console.log('[REMOTE] Track unmuted, restoring video');
                                    if (event.track.kind === 'video') {
                                        remoteVid.style.backgroundColor = 'transparent';
                                        remoteVid.srcObject = event.streams[0];
                                    }
                                };
                            };

                            // Enviar candidates usando polling con throttling
                            peerConnection.onicecandidate = (event) => {
                                if (event.candidate) {
                                    console.log('[ICE] New ICE candidate generated (acceptCall)');
                                    sendCandidateThrottled(event.candidate);
                                } else {
                                    console.log('[ICE] ICE gathering complete (acceptCall)');
                                    flushCandidateBuffer();
                                }
                            };

                            await peerConnection.setRemoteDescription(new RTCSessionDescription(_pendingRemoteOffer));
                            const answer = await peerConnection.createAnswer();
                            await peerConnection.setLocalDescription(answer);

                            // REFORZADO: Enviar answer con reintentos agresivos y verificación en DB
                            let answerConfirmed = false;
                            for (let attempt = 1; attempt <= 3; attempt++) {
                                try {
                                    console.log(`[ANSWER] 🔄 Sending answer (attempt ${attempt}/3)...`);

                                    // Enviar con 10 reintentos (vs default 5)
                                    await sendSignalViaPolling('answer', { answer: JSON.stringify(answer) }, 10, 200);

                                    // Verificar que llegó a la base de datos
                                    console.log('[ANSWER] 🔍 Verifying insertion in database...');
                                    await new Promise(r => setTimeout(r, 1000)); // Esperar 1s para propagación

                                    const urlParams = new URLSearchParams(window.location.search);
                                    const myUserId = parseInt(urlParams.get('sender_id'));
                                    const verificacion = await fetch(`${BACKEND_URL}/api/call-signals/room/${currentRoomId}/${myUserId}`);

                                    if (verificacion.ok) {
                                        const result = await verificacion.json();
                                        const answerEnDB = result.data && result.data.some(s =>
                                            s.signal_type === 'answer' && s.sender_id === myUserId
                                        );

                                        if (answerEnDB) {
                                            console.log('[ANSWER] ✅✅ CONFIRMED IN DATABASE - Answer successfully stored!');
                                            answerConfirmed = true;
                                            break;
                                        } else {
                                            console.warn(`[ANSWER] ⚠️ Not found in DB yet, retrying (${attempt}/3)...`);
                                        }
                                    } else {
                                        console.warn(`[ANSWER] ⚠️ Verification request failed: ${verificacion.status}`);
                                    }

                                    if (attempt < 3) {
                                        await new Promise(r => setTimeout(r, 1000 * attempt)); // Backoff incremental
                                    }
                                } catch (err) {
                                    console.error(`[ANSWER]   Attempt ${attempt} failed:`, err);
                                    if (attempt === 3) {
                                        console.error('[ANSWER] 🚨 CRITICAL: Failed to send answer after 3 attempts');
                                        throw new Error('Answer sending failed after maximum retries');
                                    }
                                    await new Promise(r => setTimeout(r, 1500 * attempt));
                                }
                            }

                            if (!answerConfirmed) {
                                console.error('[ANSWER] 🚨 CRITICAL: Answer not confirmed in database after all attempts');
                            } else {
                                console.log('[ANSWER] ✅ Answer process completed successfully');
                            }

                            // Iniciar polling para candidates entrantes
                            pollForCandidates(currentRoomId);

                            document.getElementById('videoCallInterface').classList.add('active');
                            document.getElementById('callStatus').textContent = 'Conectando...';
                        } catch (err) { console.error('Error accepting call', err); }
                        // limpiar pending
                        _pendingRemoteOffer = null; _pendingRemoteMeta = null;
                    } else if (data.cmd === 'rejectCall') {
                        // rechazar: opcionalmente notificar al caller
                        try { if (socket && data.roomId) socket.emit('endCall', { roomId: data.roomId, reason: 'rejected', targetUserId: data.callerId }); } catch (e) { }
                        _pendingRemoteOffer = null; _pendingRemoteMeta = null;
                    }
                } catch (err) { /* ignore malformed messages */ }
            });

            // Si la iframe se abrió con ?id_mensaje=..., intentar obtener la offer desde DB
            (function () {
                try {
                    const params = new URLSearchParams(location.search);
                    const idMensajeParam = params.get('id_mensaje') || params.get('idMensaje');
                    if (!idMensajeParam) return;

                    // Poll para encontrar la offer asociada al id_mensaje en backend
                    let attempts = 0;
                    const maxAttempts = 60;
                    const interval = setInterval(async () => {
                        attempts++;
                        try {
                            const resp = await fetch(BACKEND_URL + '/api/videollamadas/by-message/' + encodeURIComponent(idMensajeParam));
                            if (resp.ok) {
                                const json = await resp.json().catch(() => null) || {};
                                const row = json.data || json;
                                if (row && (row.offer || row.offer_local || row.oferta || row.offer_text)) {
                                    // normalizar
                                    const offerRaw = row.offer || row.offer_local || row.oferta || row.offer_text;
                                    let offerObj = null;
                                    try { offerObj = (typeof offerRaw === 'string') ? JSON.parse(offerRaw) : offerRaw; } catch (e) { offerObj = offerRaw; }
                                    // notificar al padre para que muestre la UI de llamada
                                    try { window.parent.postMessage(JSON.stringify({ cmd: 'incomingOffer', roomId: row.roomId || row.room_id || null, callerId: row.callerId || row.caller_id || null, callerName: row.callerName || row.caller_name || null, offer: offerObj, id_mensaje: idMensajeParam }), '*'); } catch (e) { }
                                    clearInterval(interval);
                                }
                            }
                        } catch (e) { /* ignorar y reintentar */ }
                        if (attempts >= maxAttempts) clearInterval(interval);
                    }, 1000);
                } catch (e) { }
            })();

            socket.on('answer', async (data) => {
                try {
                    if (!data || !data.roomId || !data.answer) return;
                    if (!peerConnection) return;
                    const remoteAnswer = (typeof data.answer === 'string') ? JSON.parse(data.answer) : data.answer;
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(remoteAnswer));
                } catch (err) { console.error('Error applying remote answer', err); }
            });

            socket.on('candidate', async (data) => {
                try {
                    if (!data || !data.roomId || !data.candidate) return;
                    if (!peerConnection) return;
                    const candObj = (typeof data.candidate === 'string') ? JSON.parse(data.candidate) : data.candidate;
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candObj));
                } catch (err) { console.warn('addIceCandidate (socket) failed', err); }
            });

            socket.on('endCall', (data) => {
                try { endCall(); } catch (e) { }
            });
        }

        // Escuchar mensajes desde el padre (host) para comandos como 'startCall'
        window.addEventListener('message', (e) => {
            try {
                const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                if (!data) return;
                if (data.cmd === 'startCall') {
                    // iniciar llamada si no está ya iniciada
                    startCall();
                }
            } catch (err) {
                // ignorar mensajes no JSON o sin estructura esperada
            }
        });
    </script>
