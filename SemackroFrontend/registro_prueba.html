    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, FacebookAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDHPaGaZIoa8fJA1Z4LTDdU7rTaYekNk1E",
            authDomain: "mi-portafolio-main.firebaseapp.com",
            projectId: "mi-portafolio-main",
            storageBucket: "mi-portafolio-main.firebasestorage.app",
            messagingSenderId: "630198308201",
            appId: "1:630198308201:web:17f7bfa9ea93e1aec541f8",
            measurementId: "G-Y4785PMVB2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        console.log("🔥 Firebase inicializado correctamente");

        let yaProcesoUsuario = false;

        auth.onAuthStateChanged((user) => {
            console.log("🔔 onAuthStateChanged disparado");
            console.log("   - yaProcesoUsuario:", yaProcesoUsuario);

            if (user && !yaProcesoUsuario) {
                console.log("✅ Usuario autenticado detectado:");
                console.log("   - Email:", user.email);
                console.log("   - UID:", user.uid);
                console.log("   - Display Name:", user.displayName);
                console.log("   - Photo URL:", user.photoURL);

                yaProcesoUsuario = true;

                const urlParams = new URLSearchParams(window.location.search);
                const fromFirebase = sessionStorage.getItem('firebaseRedirect');

                console.log("   - URL tiene parámetros?:", window.location.search);
                console.log("   - sessionStorage firebaseRedirect:", fromFirebase);

                if (fromFirebase === 'true') {
                    console.log("📱 Usuario viene de redirect de Firebase, procesando...");
                    sessionStorage.removeItem('firebaseRedirect');
                    registrarConFirebase(user);
                } else {
                    console.log("ℹ️ Usuario ya estaba autenticado (no es nuevo redirect)");
                }
            } else if (!user) {
                console.log("👤 No hay usuario autenticado");
                yaProcesoUsuario = false;
            } else {
                console.log("ℹ️ Usuario ya fue procesado anteriormente");
            }
        });

        async function registrarConFirebase(user) {
            try {
                const email = user.email;
                const displayName = user.displayName || 'Usuario de Firebase';

                console.log("🔐 Iniciando registro Firebase para:", email);

                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = `Registrando a ${displayName}...`;
                mensajeDiv.className = '';

                const url = `${window.APP_CONFIG.BACKEND_URL}/api/registro`;

                console.log("📝 Enviando POST a /api/registro con:", { correo: email, contrasena: email });
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        correo: email,
                        contrasena: email
                    })
                });

                const data = await response.json();
                console.log("📋 Respuesta del backend:", response.status, data);

                if (response.status === 201) {
                    console.log("✅ Usuario registrado correctamente");
                    const successMessage = translations[currentLanguage]['register.successFirebase'] || '✓ Registro exitoso con Firebase. Redirigiendo...';
                    mensajeDiv.textContent = successMessage;
                    mensajeDiv.className = 'bg-green-100 text-green-700 border border-green-400';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else if (response.status === 409) {
                    console.log("ℹ️ Usuario ya existe, redirigiendo a login");
                    mensajeDiv.textContent = 'Ya tienes cuenta. Redirigiendo a login...';
                    mensajeDiv.className = 'bg-green-100 text-green-700 border border-green-400';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(data.mensaje || 'Error al registrar');
                }

            } catch (error) {
                console.error('  Error en registro Firebase:', error);
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Error: ' + error.message;
                mensajeDiv.className = 'bg-red-100 text-red-700 border border-red-400';
            }
        }

        window.registrarConGoogle = () => {
            try {
                console.log("🔵 Click en botón de Google");
                const mensajeDiv = document.getElementById('mensaje');
                const redirectMessage = translations[currentLanguage]['register.redirectingGoogle'] || 'Redirigiendo a Google...';
                mensajeDiv.textContent = redirectMessage;
                mensajeDiv.className = '';

                sessionStorage.setItem('firebaseRedirect', 'true');
                console.log("✅ Marcado firebaseRedirect en sessionStorage");

                const provider = new GoogleAuthProvider();
                signInWithRedirect(auth, provider);
            } catch (error) {
                console.error('  Error al registrar con Google:', error);
                sessionStorage.removeItem('firebaseRedirect');
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Error con Google: ' + error.message;
                mensajeDiv.className = 'bg-red-100 text-red-700 border border-red-400';
            }
        };

        window.registrarConFacebook = () => {
            try {
                console.log("🔵 Click en botón de Facebook");
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Redirigiendo a Facebook...';
                mensajeDiv.className = '';

                sessionStorage.setItem('firebaseRedirect', 'true');
                console.log("✅ Marcado firebaseRedirect en sessionStorage");

                const provider = new FacebookAuthProvider();
                signInWithRedirect(auth, provider);
            } catch (error) {
                console.error('  Error al registrar con Facebook:', error);
                sessionStorage.removeItem('firebaseRedirect');
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Error con Facebook: ' + error.message;
                mensajeDiv.className = 'bg-red-100 text-red-700 border border-red-400';
            }
        };
    </script>

    <script>
        // Verificar si viene de autenticación con Google
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userId = urlParams.get('userId');
            const email = urlParams.get('email');
            const source = urlParams.get('source');

            const mensajeDiv = document.getElementById('mensaje');

            if (token && userId && email && source === 'google') {
                console.log("Autenticación con Google exitosa");
                console.log("   - Email:", email);
                console.log("   - User ID:", userId);

                localStorage.setItem('authToken', token);
                localStorage.setItem('usuarioId', userId);
                localStorage.setItem('correoUsuario', email);
                localStorage.setItem('firebaseUser', 'true');

                mensajeDiv.classList.remove('hidden');
                const successGoogleMessage = translations[currentLanguage]['register.successGoogle'] || "Registro con Google exitoso. Redirigiendo...";
                mensajeDiv.textContent = successGoogleMessage;
                mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-green-100 text-green-700 border border-green-400';

                setTimeout(() => {
                    window.location.href = "Descubrir.html";
                }, 1500);

                return;
            }

            const error = urlParams.get('error');
            if (error) {
                mensajeDiv.classList.remove('hidden');
                if (error === 'auth_failed') {
                    mensajeDiv.textContent = "Error: Autenticación fallida";
                    mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-red-100 text-red-700 border border-red-400';
                } else if (error === 'server_error') {
                    mensajeDiv.textContent = "Error del servidor";
                    mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-red-100 text-red-700 border border-red-400';
                }
            }
        });

        // REGISTRO TRADICIONAL
        document.getElementById('registroForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const correo = document.getElementById('correo').value;
            const contrasena = document.getElementById('contrasena').value;
            const mensajeDiv = document.getElementById('mensaje');

            mensajeDiv.classList.add('hidden');

            try {
                const url = `${window.APP_CONFIG.BACKEND_URL}/api/registro`;

                console.log("Registro tradicional para:", correo);
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ correo, contrasena })
                });

                const data = await response.json();

                mensajeDiv.classList.remove('hidden');

                if (response.status === 201) {
                    mensajeDiv.textContent = '✓ Registro Exitoso: ' + data.mensaje;
                    mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-green-100 text-green-700 border border-green-400';
                    document.getElementById('registroForm').reset();

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } else if (response.status === 409) {
                    mensajeDiv.textContent = 'Error: Este correo ya está registrado.';
                    mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-red-100 text-red-700 border border-red-400';

                } else {
                    mensajeDiv.textContent = 'Error del servidor: ' + (data.mensaje || 'Intente de nuevo.');
                    mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-red-100 text-red-700 border border-red-400';
                }

            } catch (error) {
                console.error('Error al conectar con el backend:', error);
                mensajeDiv.classList.remove('hidden');
                mensajeDiv.textContent = 'Error de conexión. Asegúrate que el Backend esté activo.';
                mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-red-100 text-red-700 border border-red-400';
            }
        });

        // REGISTRO CON GOOGLE
        const googleBtn = document.getElementById("google-registro-btn");
        if (googleBtn) {
            googleBtn.addEventListener("click", () => {
                console.log("Click en Continuar con Google");
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.classList.remove('hidden');
                const redirectMessage = translations[currentLanguage]['register.redirectingGoogle'] || 'Redirigiendo a Google...';
                mensajeDiv.textContent = redirectMessage;
                mensajeDiv.className = 'p-3 text-sm font-medium rounded-lg mb-6 text-center bg-blue-100 text-blue-700';
                window.location.href = `${window.APP_CONFIG.BACKEND_URL}/api/auth/google`;
            });
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Sistema de Traducción (Funciones) -->
    <script>
        function changeLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('preferred_language', lang);
            document.getElementById('currentLang').textContent = lang.toUpperCase();
            applyTranslations();

            const dropdown = document.getElementById('languageDropdown');
            if (dropdown) {
                dropdown.style.display = 'none';
            }
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[currentLanguage][key]) {
                    element.textContent = translations[currentLanguage][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
                const key = element.getAttribute('data-i18n-placeholder');
                if (translations[currentLanguage][key]) {
                    element.placeholder = translations[currentLanguage][key];
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('currentLang').textContent = currentLanguage.toUpperCase();
            applyTranslations();

            const languageBtn = document.getElementById('languageBtn');
            const languageDropdown = document.getElementById('languageDropdown');

            if (languageBtn && languageDropdown) {
                languageBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isVisible = languageDropdown.style.display === 'block';
                    languageDropdown.style.display = isVisible ? 'none' : 'Block';
                });

                document.addEventListener('click', () => {
                    languageDropdown.style.display = 'none';
                });

                languageDropdown.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }
        });
    </script>
