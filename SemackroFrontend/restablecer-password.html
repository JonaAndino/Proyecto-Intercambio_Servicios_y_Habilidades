<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>

    <title>Restablecer Contraseña - SEMACKRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='none' stroke='%232563EB' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>"
        type="image/svg+xml">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background-color: #ffffff !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: fixed !important;
            top: 0;
            z-index: 1050 !important;
            width: 100%;
        }

        .navbar * {
            opacity: 1 !important;
            visibility: visible !important;
        }

        .navbar-brand {
            color: #2563EB !important;
            font-weight: 800 !important;
            font-size: 1.5rem !important;
            letter-spacing: -0.025em;
        }

        .navbar-nav .nav-link {
            color: #000000 !important;
            font-weight: 700 !important;
            transition: color 0.15s ease;
            margin-right: 1.5rem;
            font-size: 1rem !important;
        }

        .navbar-nav .nav-link:hover {
            color: #2563EB !important;
        }

        .btn-register {
            background-color: #2563EB !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            border: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.15s ease;
        }

        .btn-register:hover {
            background-color: #1d4ed8 !important;
        }

        body {
            background-image: url('113435-OOM6G9-66.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        main {
            padding-top: 100px;
            padding-bottom: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            max-width: 480px;
            width: 100%;
        }

        @media (max-width: 640px) {
            main {
                padding-top: 90px;
                padding-bottom: 20px;
            }

            .reset-card {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">SEMACKRO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#como-funciona" data-i18n="nav.howItWorks">Cómo Funciona</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#habilidades" data-i18n="nav.skills">Habilidades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#comunidad" data-i18n="nav.community">Comunidad</a>
                    </li>
                </ul>
                <div class="d-flex gap-2 align-items-center">
                    <a href="registro_prueba.html" class="btn btn-register" data-i18n="nav.register">Crear Cuenta</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="px-4 sm:px-6 lg:px-8">
        <div class="reset-card bg-white p-6 sm:p-8 rounded-xl shadow-2xl">
            <!-- Header -->
            <div class="text-center mb-6">
                <div class="flex items-center justify-center gap-3 mb-2">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900" data-i18n="reset.title">
                        Nueva Contraseña
                    </h1>
                </div>
                <p class="text-sm text-gray-600" data-i18n="reset.subtitle">
                    Ingresa tu nueva contraseña
                </p>
            </div>

            <!-- Message Box -->
            <div id="message-box" style="display: none;" class="mb-6"></div>

            <!-- Token inválido -->
            <div id="invalid-token" style="display: none;" class="text-center py-8">
                <svg class="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
                <h3 class="text-lg font-semibold text-gray-800 mb-2" data-i18n="reset.invalidToken">Enlace inválido o
                    expirado</h3>
                <p class="text-gray-600 mb-4" data-i18n="reset.requestNew">Por favor solicita un nuevo enlace de
                    recuperación</p>
                <a href="recuperar-password.html" class="text-blue-600 hover:text-blue-700 font-medium"
                    data-i18n="reset.requestLink">
                    Solicitar nuevo enlace
                </a>
            </div>

            <!-- Formulario -->
            <form id="reset-form" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2"
                        data-i18n="reset.newPassword">
                        Nueva Contraseña
                    </label>
                    <input type="password" id="password" name="password" required minlength="6"
                        placeholder="Mínimo 6 caracteres" data-i18n-placeholder="reset.passwordPlaceholder"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150 ease-in-out">
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2"
                        data-i18n="reset.confirmPassword">
                        Confirmar Contraseña
                    </label>
                    <input type="password" id="confirm-password" name="confirm-password" required minlength="6"
                        placeholder="Repite tu contraseña" data-i18n-placeholder="reset.confirmPlaceholder"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150 ease-in-out">
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm sm:text-base font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span id="btn-text" data-i18n="reset.submit">Restablecer Contraseña</span>
                </button>
            </form>

            <!-- Link para regresar al login -->
            <div class="mt-6 text-center border-t border-gray-200 pt-4">
                <a href="login.html"
                    class="text-sm font-medium text-blue-600 hover:text-blue-500 transition duration-150 flex items-center justify-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    <span data-i18n="reset.backToLogin">Volver al inicio de sesión</span>
                </a>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs sm:text-sm">
            <p data-i18n="footer.rights">&copy; 2025 SEMACKRO. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const translations = {
            es: {
                'nav.howItWorks': 'Cómo Funciona',
                'nav.skills': 'Habilidades',
                'nav.community': 'Comunidad',
                'nav.register': 'Crear Cuenta',
                'reset.title': 'Nueva Contraseña',
                'reset.subtitle': 'Ingresa tu nueva contraseña',
                'reset.newPassword': 'Nueva Contraseña',
                'reset.passwordPlaceholder': 'Mínimo 6 caracteres',
                'reset.confirmPassword': 'Confirmar Contraseña',
                'reset.confirmPlaceholder': 'Repite tu contraseña',
                'reset.submit': 'Restablecer Contraseña',
                'reset.processing': 'Procesando...',
                'reset.backToLogin': 'Volver al inicio de sesión',
                'reset.invalidToken': 'Enlace inválido o expirado',
                'reset.requestNew': 'Por favor solicita un nuevo enlace de recuperación',
                'reset.requestLink': 'Solicitar nuevo enlace',
                'reset.passwordMismatch': 'Las contraseñas no coinciden',
                'reset.success': 'Contraseña restablecida exitosamente. Redirigiendo al login...',
                'footer.rights': '© 2025 SEMACKRO. Todos los derechos reservados.'
            },
            en: {
                'nav.howItWorks': 'How It Works',
                'nav.skills': 'Skills',
                'nav.community': 'Community',
                'nav.register': 'Sign Up',
                'reset.title': 'New Password',
                'reset.subtitle': 'Enter your new password',
                'reset.newPassword': 'New Password',
                'reset.passwordPlaceholder': 'Minimum 6 characters',
                'reset.confirmPassword': 'Confirm Password',
                'reset.confirmPlaceholder': 'Repeat your password',
                'reset.submit': 'Reset Password',
                'reset.processing': 'Processing...',
                'reset.backToLogin': 'Back to login',
                'reset.invalidToken': 'Invalid or expired link',
                'reset.requestNew': 'Please request a new recovery link',
                'reset.requestLink': 'Request new link',
                'reset.passwordMismatch': 'Passwords do not match',
                'reset.success': 'Password reset successfully. Redirecting to login...',
                'footer.rights': '© 2025 SEMACKRO. All rights reserved.'
            }
        };

        let currentLanguage = localStorage.getItem('preferred_language') || 'es';
        const t = (key) => translations[currentLanguage][key] || key;

        function showMessage(text, type) {
            const messageBox = document.getElementById("message-box");
            messageBox.style.display = "block";
            let classes = "p-3 text-sm font-medium rounded-lg mb-4 text-center ";
            if (type === 'success') classes += "bg-green-100 text-green-700";
            else if (type === 'error') classes += "bg-red-100 text-red-700";
            else if (type === 'info') classes += "bg-blue-100 text-blue-700";
            messageBox.className = classes;
            messageBox.textContent = text;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = t(key);
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = t(key);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTranslations();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                document.getElementById('reset-form').style.display = 'none';
                document.getElementById('invalid-token').style.display = 'block';
                return;
            }

            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                const submitBtn = document.getElementById('submit-btn');
                const btnText = document.getElementById('btn-text');

                if (password !== confirmPassword) {
                    showMessage(t('reset.passwordMismatch'), 'error');
                    return;
                }

                submitBtn.disabled = true;
                btnText.textContent = t('reset.processing');
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

                try {
                    const backendUrl = window.APP_CONFIG ? window.APP_CONFIG.BACKEND_URL : 'http://localhost:3001';
                    const response = await fetch(`${backendUrl}/api/password/restablecer`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, nuevaPassword: password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showMessage(t('reset.success'), 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        if (data.mensaje && (data.mensaje.includes('expirado') || data.mensaje.includes('inválido'))) {
                            document.getElementById('reset-form').style.display = 'none';
                            document.getElementById('invalid-token').style.display = 'block';
                        } else {
                            showMessage(data.mensaje || 'Error al restablecer contraseña', 'error');
                        }
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showMessage('Error de conexión con el servidor', 'error');
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = t('reset.submit');
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
