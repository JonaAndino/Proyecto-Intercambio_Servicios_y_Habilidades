<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada • SEMACKRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='none' stroke='%232563EB' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>"
    type="image/svg+xml">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --primary-blue: #3b82f6;
      --primary-blue-dark: #2563EB;
      --header-navy: #1a2a4b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-image: url('/113435-OOM6G9-66.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar Styles */
    .navbar {
      background-color: #ffffff !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      position: fixed !important;
      top: 0;
      z-index: 1050 !important;
      width: 100%;
    }

    .navbar * {
      opacity: 1 !important;
      visibility: visible !important;
    }

    .navbar-brand {
      color: #2563EB !important;
      font-weight: 800 !important;
      font-size: 1.5rem !important;
      letter-spacing: -0.025em;
      opacity: 1 !important;
      visibility: visible !important;
    }

    .navbar-nav .nav-item {
      opacity: 1 !important;
      visibility: visible !important;
    }

    .navbar-nav .nav-link {
      color: #000000 !important;
      font-weight: 700 !important;
      transition: color 0.15s ease;
      margin-right: 1.5rem;
      font-size: 1rem !important;
      opacity: 1 !important;
      visibility: visible !important;
      text-decoration: none !important;
    }

    .navbar-nav .nav-link:hover {
      color: #2563EB !important;
    }

    .btn-login {
      color: #000000 !important;
      font-weight: 700 !important;
      background-color: transparent !important;
      border: 2px solid #2563EB !important;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      transition: all 0.15s ease;
      opacity: 1 !important;
      visibility: visible !important;
      text-decoration: none !important;
    }

    .btn-login:hover {
      color: #ffffff !important;
      background-color: #2563EB !important;
    }

    .btn-register {
      background-color: #2563EB !important;
      color: #ffffff !important;
      font-weight: 700 !important;
      padding: 0.5rem 1.5rem;
      border-radius: 9999px;
      border: none;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transition: all 0.15s ease;
      opacity: 1 !important;
      visibility: visible !important;
      text-decoration: none !important;
    }

    .btn-register:hover {
      background-color: #1d4ed8 !important;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    .navbar-toggler {
      border-color: rgba(75, 85, 99, 0.5);
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(75, 85, 99, 1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }

    /* 404 Content */
    .error-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 720px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      border: 3px solid var(--header-navy);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
    }

    .icon {
      display: block;
      margin: 0 auto 1.2rem;
      width: 120px;
      max-width: 50%;
      height: auto;
      object-fit: contain;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 10px rgba(26, 42, 75, 0.3));
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    h1 {
      color: var(--header-navy);
      margin: 0;
      font-size: clamp(1.4rem, 2vw, 1.8rem);
      font-weight: 800;
    }

    p {
      color: #475569;
      margin-top: 12px;
      font-size: clamp(0.9rem, 1.2vw, 1rem);
      line-height: 1.6;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 9999px;
      background: var(--primary-blue-dark);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn-back:hover {
      background: var(--primary-blue);
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      color: white;
    }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/index.html">SEMACKRO</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/index.html#como-funciona" data-i18n="nav.howItWorks">Cómo Funciona</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/index.html#habilidades" data-i18n="nav.skills">Habilidades</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/index.html#comunidad" data-i18n="nav.community">Comunidad</a>
          </li>
        </ul>
        <div class="d-flex gap-2 align-items-center">
          <!-- Selector de idioma -->
          <div class="position-relative">
            <button id="languageBtn"
              class="btn btn-sm border border-secondary rounded-pill d-flex align-items-center gap-2 px-3 py-2 bg-white"
              style="min-width: 80px;">
              <svg class="text-secondary" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129">
                </path>
              </svg>
              <span id="currentLang" class="fw-semibold small">ES</span>
              <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </button>

            <div id="languageDropdown" class="dropdown-menu shadow-lg border-0 rounded-3"
              style="display: none; position: absolute; right: 0; min-width: 180px; z-index: 1050;">
              <button onclick="changeLanguage('es')" class="dropdown-item d-flex align-items-center gap-3 px-3 py-2">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129">
                  </path>
                </svg>
                <span class="small fw-semibold text-secondary">ES</span>
                <span class="fw-medium">Español</span>
              </button>
              <button onclick="changeLanguage('en')"
                class="dropdown-item d-flex align-items-center gap-3 px-3 py-2 border-top">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129">
                  </path>
                </svg>
                <span class="small fw-semibold text-secondary">EN</span>
                <span class="fw-medium">English</span>
              </button>
            </div>
          </div>

          <a href="/login.html"
            class="text-gray-700 font-semibold hover:text-blue-600 transition duration-150 px-4 py-2 rounded-full"
            data-i18n="nav.login">Iniciar Sesión</a>
          <a href="/registro_prueba.html" class="btn btn-register" data-i18n="nav.register">Crear Cuenta</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ERROR CONTENT -->
  <div class="error-container">
    <div class="card">
      <!-- Imagen local de error -->
      <img src="/error-404.png" alt="Error 404" class="icon">

      <h1 data-i18n="error.title">404 — Página no encontrada</h1>
      <p data-i18n="error.description">
        Parece que la dirección que intentaste abrir no existe o fue modificada.
        Si escribiste la URL manualmente, revisa posibles errores tipográficos.
      </p>

      <div style="margin-top:24px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
        <a class="btn-back" href="/index.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 19l-7-7 7-7"></path>
          </svg>
          <span data-i18n="error.backButton">Volver al inicio</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Sistema de Traducción -->
  <script>
    const translations = {
      es: {
        'nav.howItWorks': 'Cómo Funciona',
        'nav.skills': 'Habilidades',
        'nav.community': 'Comunidad',
        'nav.login': 'Iniciar Sesión',
        'nav.register': 'Crear Cuenta',
        'error.title': '404 — Página no encontrada',
        'error.description': 'Parece que la dirección que intentaste abrir no existe o fue modificada. Si escribiste la URL manualmente, revisa posibles errores tipográficos.',
        'error.backButton': 'Volver al inicio'
      },
      en: {
        'nav.howItWorks': 'How It Works',
        'nav.skills': 'Skills',
        'nav.community': 'Community',
        'nav.login': 'Login',
        'nav.register': 'Sign Up',
        'error.title': '404 — Page not found',
        'error.description': 'It seems the address you tried to open does not exist or has been modified. If you typed the URL manually, check for possible typos.',
        'error.backButton': 'Back to home'
      }
    };

    let currentLanguage = localStorage.getItem('preferred_language') || 'es';

    function changeLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('preferred_language', lang);
      document.getElementById('currentLang').textContent = lang.toUpperCase();
      applyTranslations();

      const dropdown = document.getElementById('languageDropdown');
      if (dropdown) {
        dropdown.style.display = 'none';
      }
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[currentLanguage][key]) {
          element.textContent = translations[currentLanguage][key];
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('currentLang').textContent = currentLanguage.toUpperCase();
      applyTranslations();

      const languageBtn = document.getElementById('languageBtn');
      const languageDropdown = document.getElementById('languageDropdown');

      if (languageBtn && languageDropdown) {
        languageBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isVisible = languageDropdown.style.display === 'block';
          languageDropdown.style.display = isVisible ? 'none' : 'block';
        });

        document.addEventListener('click', () => {
          languageDropdown.style.display = 'none';
        });

        languageDropdown.addEventListener('click', (e) => {
          e.stopPropagation();
        });
      }
    });
  </script>
</body>

</html>
