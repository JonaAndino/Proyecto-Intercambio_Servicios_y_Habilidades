<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Calificación</title>
    
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="container">
        <form id="calificacionForm">
            <h2>Calificar Usuario</h2>

            <label for="rating">Puntuación (1-5):</label>
            <div class="rating-stars" data-current-rating="0">
                <span data-value="1">★</span>
                <span data-value="2">★</span>
                <span data-value="3">★</span>
                <span data-value="4">★</span>
                <span data-value="5">★</span>
            </div>
            <input type="hidden" id="rating" name="rating" required>

            <label for="comentario">Comentario (Opcional):</label>
            <textarea id="comentario" name="comentario" rows="4" maxlength="255"></textarea>

            <button type="submit">Enviar Calificación</button>
            
            <div id="message" style="display: none;"></div>
            
        </form>

    </div>
    
    <script>
    // -------------------------------------------------------------------
    // 1. OBTENER IDs DINÁMICOS Y VALIDAR SESIÓN
    // -------------------------------------------------------------------
    
    // Función para obtener el ID del usuario a calificar de la URL (ej: ?id=123)
    function obtenerIdUsuarioDeURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id'); 
        return id ? parseInt(id) : null;
    }

    // ID del usuario a calificar (DE LA URL)
    const USUARIO_CALIFICADO_ID = obtenerIdUsuarioDeURL();
    
    // ID del usuario logueado (DE LOCALSTORAGE)
    const USUARIO_CALIFICADOR_ID = parseInt(localStorage.getItem('usuarioLogueadoId'));
    
    // Validación de sesión y URL
    if (isNaN(USUARIO_CALIFICADOR_ID) || !USUARIO_CALIFICADOR_ID) {
        alert("Error de sesión: No has iniciado sesión.");
        // Redireccionar al login es clave aquí
    }
    if (!USUARIO_CALIFICADO_ID) {
        alert("Error de URL: ID del usuario a calificar no encontrado.");
    }
    
    const API_URL = 'http://localhost:3001/api/calificaciones';
    const form = document.getElementById('calificacionForm');
    const ratingInput = document.getElementById('rating');
    const messageDiv = document.getElementById('message');
    const starsContainer = document.querySelector('.rating-stars');

    // ... (El resto de tu lógica de estrellas: updateStars, mouseover, mouseout, click) ...

    function updateStars(value) {
        starsContainer.querySelectorAll('span').forEach(star => {
            if (parseInt(star.getAttribute('data-value')) <= value) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }

    starsContainer.addEventListener('mouseover', function(e) {
        if (e.target.tagName === 'SPAN') {
            const value = e.target.getAttribute('data-value');
            updateStars(value);
        }
    });

    starsContainer.addEventListener('mouseout', function() {
        updateStars(starsContainer.getAttribute('data-current-rating'));
    });

    starsContainer.addEventListener('click', function(e) {
        if (e.target.tagName === 'SPAN') {
            const value = e.target.getAttribute('data-value');
            starsContainer.setAttribute('data-current-rating', value);
            ratingInput.value = value;
            updateStars(value);
        }
    });

    // -------------------------------------------------------------------
    // 2. Manejo del envío del formulario (Usa los IDs dinámicos)
    // -------------------------------------------------------------------
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Verificación final de IDs
        if (!USUARIO_CALIFICADOR_ID || !USUARIO_CALIFICADO_ID) {
            displayMessage("Error: Faltan IDs de usuario para calificar.", 'error');
            return;
        }

        const data = {
            usuario_calificador: USUARIO_CALIFICADOR_ID, 
            usuario_calificado: USUARIO_CALIFICADO_ID,   
            rating: parseInt(ratingInput.value),
            comentario: document.getElementById('comentario').value.trim() || undefined
        };

        if (!data.rating || data.rating < 1 || data.rating > 5) {
            displayMessage('Por favor, selecciona una puntuación entre 1 y 5.', 'error');
            return;
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
                displayMessage(`Éxito: ${result.mensaje}`, 'success');
                form.reset(); 
                starsContainer.setAttribute('data-current-rating', '0');
                updateStars(0);
            } else {
                displayMessage(`Error: ${result.error || result.mensaje || 'Error desconocido del servidor'}`, 'error');
            }
        } catch (error) {
            displayMessage(`Error de red: No se pudo conectar con el servidor API.`, 'error');
            console.error('Error en la petición:', error);
        }
    });

    // -------------------------------------------------------------------
    // 3. Función de Mensajes
    // -------------------------------------------------------------------
    function displayMessage(message, type) {
        messageDiv.textContent = message;
        messageDiv.className = type;
        messageDiv.style.display = 'block'; 
        
        // Ocultar el mensaje después de un tiempo si es éxito
        if (type === 'success') {
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000); 
        }
    }
    
    // Inicializar estrellas
    updateStars(0);
</script>
