<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - SkillConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Recuperar Contraseña</h1>
            <p class="text-gray-600 mt-2">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña</p>
        </div>

        <!-- Message Box -->
        <div id="message-box" style="display: none;" class="mb-6"></div>

        <!-- Formulario -->
        <form id="recuperar-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    Correo Electrónico
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                        </svg>
                    </div>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        required
                        placeholder="tu@email.com"
                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150"
                    >
                </div>
            </div>

            <button 
                type="submit" 
                id="submit-btn"
                class="w-full flex items-center justify-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-medium transition duration-150"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <span id="btn-text">Enviar Enlace de Recuperación</span>
            </button>
        </form>

        <!-- Link para regresar al login -->
        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-500 flex items-center justify-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Volver al inicio de sesión
            </a>
        </div>
    </div>

    <script>
        // Función para mostrar mensajes
        function showMessage(text, type) {
            const messageBox = document.getElementById("message-box");
            messageBox.style.display = "block";
            
            let classes = "p-4 rounded-lg text-sm font-medium ";
            if (type === 'success') {
                classes += "bg-green-100 text-green-700 border border-green-300";
            } else if (type === 'error') {
                classes += "bg-red-100 text-red-700 border border-red-300";
            } else if (type === 'info') {
                classes += "bg-blue-100 text-blue-700 border border-blue-300";
            }
            
            messageBox.className = classes;
            messageBox.textContent = text;
        }

        // Manejar el envío del formulario
        document.getElementById('recuperar-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            
            // Deshabilitar botón mientras se procesa
            submitBtn.disabled = true;
            btnText.textContent = 'Enviando...';
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            try {
                const response = await fetch('http://localhost:3001/api/password/solicitar-recuperacion', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ correo: email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.mensaje, 'success');
                    document.getElementById('recuperar-form').reset();
                    
                    // Mostrar mensaje adicional
                    setTimeout(() => {
                        showMessage('Revisa tu bandeja de entrada y la carpeta de spam.', 'info');
                    }, 2000);
                } else {
                    showMessage(data.mensaje || 'Error al procesar la solicitud', 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión con el servidor. Verifica que el backend esté activo.', 'error');
            } finally {
                // Rehabilitar botón
                submitBtn.disabled = false;
                btnText.textContent = 'Enviar Enlace de Recuperación';
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>

</body>
</html>
