<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SkillConnect</title>
    <!-- Carga de Tailwind CSS -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='none' stroke='%232563EB' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>" type="image/svg+xml">

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, FacebookAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDHPaGaZIoa8fJA1Z4LTDdU7rTaYekNk1E",
            authDomain: "mi-portafolio-main.firebaseapp.com",
            projectId: "mi-portafolio-main",
            storageBucket: "mi-portafolio-main.firebasestorage.app",
            messagingSenderId: "630198308201",
            appId: "1:630198308201:web:17f7bfa9ea93e1aec541f8",
            measurementId: "G-Y4785PMVB2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Exponer funciones globalmente
        window.firebaseAuth = {
            auth,
            GoogleAuthProvider,
            FacebookAuthProvider,
            signInWithRedirect,
            getRedirectResult
        };
    </script>
    <style>
        /* Fuente Inter para una apariencia moderna */
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-6 text-center">
            SkillConnect
        </h1>
        <p class="text-center text-sm text-gray-600 mb-8">
            Inicia sesión para acceder a tu descubrir y conectar con el backend.
        </p>

        <!-- CRÍTICO: Este div se usa para mostrar mensajes de estado/error -->
        <div id="message-box" class="p-3 text-sm font-medium rounded-lg mb-6 text-center" style="display:none;">
            <!-- Los mensajes se mostrarán aquí (Ej: "Validando credenciales...") -->
        </div>

        <!-- CRÍTICO: Este formulario debe tener el ID 'login-form' -->
        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">
                    Correo Electrónico
                </label>
                <!-- CRÍTICO: Este input debe tener el ID 'email' -->
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    autocomplete="email"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150 ease-in-out"
                    placeholder="tucorreo@ejemplo.com"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">
                    Contraseña
                </label>
                <!-- CRÍTICO: Este input debe tener el ID 'password' -->
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    autocomplete="current-password"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150 ease-in-out"
                    placeholder="••••••••"
                >
            </div>

            <div class="flex items-center justify-end">
                <a href="recuperar-password.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <!-- CRÍTICO: Este botón debe tener el ID 'login-button' -->
            <button 
                type="submit" 
                id="login-button" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out"
            >
                Iniciar Sesión
            </button>
        </form>
        
        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">o continúa con</span>
            </div>
        </div>
        
        <!-- Botones de autenticación social -->
        <div class="space-y-3">
            <button 
                id="google-login-btn"
                type="button"
                class="w-full flex items-center justify-center gap-3 py-2 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out"
            >
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar con Google
            </button>
        </div>
        
        <div class="mt-6 text-center">
            <a href="registro_prueba.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                ¿No tienes cuenta? Regístrate aquí
            </a>
        </div>

    </div>

    <!-- CRÍTICO: Carga el script como un módulo -->
    <!-- <script type="module" src="js/login.js"></script> -->
 <script>
    // Si ya hay sesión activa, redirigir al Descubrir para evitar que el usuario vuelva al login
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const hasUser = localStorage.getItem('usuarioId');
            const hasToken = localStorage.getItem('token') || localStorage.getItem('authToken');
            if (hasUser && hasToken) {
                // Mantener sesión abierta; evitar mostrar login
                window.location.href = 'Descubrir.html';
            }
        } catch (e) {
            // no hacer nada si el acceso a localStorage falla
            console.warn('No se pudo verificar sesión:', e);
        }
    });
        // AL CARGAR LA PÁGINA: Verificar si viene de autenticación con Google
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userId = urlParams.get('userId');
            const email = urlParams.get('email');
            const source = urlParams.get('source');
            
            if (token && userId && email && source === 'google') {
                console.log("Autenticación con Google exitosa");
                console.log("   - Email:", email);
                console.log("   - User ID:", userId);
                
                // Guardar en localStorage (guardamos token en dos claves para compatibilidad)
                localStorage.setItem('authToken', token);
                localStorage.setItem('token', token);
                localStorage.setItem('usuarioId', userId);
                localStorage.setItem('correoUsuario', email);
                localStorage.setItem('firebaseUser', 'true');
                
                showMessage("Descubrir de sesión con Google exitoso. Redirigiendo...", "bg-green-100 text-green-700");
                
                // Limpiar URL y redirigir
                setTimeout(() => {
                    window.location.href = "Descubrir.html";
                }, 1500);
                
                return; // No continuar con el resto del código
            }
            
            // Verificar si hay error en la autenticación
            const error = urlParams.get('error');
            if (error) {
                if (error === 'auth_failed') {
                    showMessage("Error: Autenticación fallida", "bg-red-100 text-red-700");
                } else if (error === 'server_error') {
                    showMessage("Error del servidor", "bg-red-100 text-red-700");
                }
            }
        });
        
        // Función para mostrar mensajes (Usando clases de Tailwind para colores)
        function showMessage(text, classes) {
            const messageBox = document.getElementById("message-box");
            if (messageBox) {
                messageBox.style.display = "block";
                messageBox.className = `p-3 text-sm font-medium rounded-lg mb-6 text-center ${classes}`;
                messageBox.textContent = text;
            }
        }
        
        // Función para autenticar con Firebase y enviar al backend
        async function authenticateWithFirebase(user) {
            try {
                const email = user.email;
                const displayName = user.displayName || 'Usuario de Firebase';
                
                console.log("Iniciando autenticación para:", email);
                showMessage(`Autenticando a ${displayName}...`, "bg-blue-100 text-blue-700");
                
                // ESTRATEGIA: Enviar correo como email y password al backend
                const REGISTER_URL = "http://localhost:3001/api/registro";
                const LOGIN_URL = "http://localhost:3001/api/login-jwt";
                
                // PASO 1: Intentar registrar primero (si el usuario no existe)
                console.log("Intentando registrar usuario en backend...");
                try {
                    const registerRes = await fetch(REGISTER_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            correo: email, 
                            contrasena: email  // Usar el correo como contraseña
                        })
                    });
                    
                    const registerData = await registerRes.json();
                    console.log("Respuesta de registro:", registerRes.status, registerData);
                    
                    if (registerRes.status === 201) {
                        console.log("Usuario registrado exitosamente");
                        showMessage("Cuenta creada exitosamente", "bg-green-100 text-green-700");
                        await new Promise(resolve => setTimeout(resolve, 1000)); // Esperar 1 segundo
                    } else if (registerRes.status === 409) {
                        console.log("Usuario ya existe, continuando con login...");
                    }
                } catch (regError) {
                    console.error("Error en registro (ignorado):", regError);
                }
                
                // PASO 2: Hacer login (ya sea usuario nuevo o existente)
                console.log("Intentando login en backend...");
                const loginRes = await fetch(LOGIN_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        correo: email, 
                        contrasena: email  // Usar el correo como contraseña
                    })
                });
                
                const loginData = await loginRes.json();
                console.log("Respuesta de login:", loginRes.status, loginData);
                
                if (loginRes.ok) {
                    console.log("Login exitoso, guardando datos...");
                    // Guardar token y datos en localStorage
                    localStorage.setItem('authToken', loginData.token);
                    localStorage.setItem('token', loginData.token);
                    localStorage.setItem('usuarioId', loginData.usuarioId);
                    localStorage.setItem('correoUsuario', loginData.correo);
                    localStorage.setItem('firebaseUser', 'true');
                    
                    showMessage("Descubrir de sesión exitoso. Redirigiendo...", "bg-green-100 text-green-700");
                    
                    console.log("Redirigiendo al descubrir...");
                    setTimeout(() => {
                        window.location.href = "Descubrir.html";
                    }, 1500);
                } else {
                    throw new Error(loginData.error || "Error al autenticar con el backend");
                }
                
            } catch (error) {
                console.error("Error en autenticación Firebase:", error);
                showMessage("Error: " + error.message, "bg-red-100 text-red-700");
            }
        }
        
        // Espera que el DOM esté listo
        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("login-form");
            const LOGIN_URL = "http://localhost:3001/api/login-jwt";

            if (!form) return;
            
            // VERIFICAR SI HAY UN RESULTADO DE REDIRECT DE FIREBASE
            console.log("Verificando resultado de Firebase redirect...");
            try {
                const result = await window.firebaseAuth.getRedirectResult(window.firebaseAuth.auth);
                console.log("Resultado de redirect:", result);
                
                if (result && result.user) {
                    // Usuario autenticado con Firebase después del redirect
                    console.log("Usuario de Firebase detectado:", result.user.email);
                    showMessage("Procesando autenticación con Firebase...", "bg-blue-100 text-blue-700");
                    await authenticateWithFirebase(result.user);
                    return; // No continuar con el resto del código
                } else {
                    console.log("No hay resultado de redirect de Firebase");
                }
            } catch (error) {
                console.error("Error al obtener resultado de redirect:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showMessage("Error: " + error.message, "bg-red-100 text-red-700");
                }
            }

            // LOGIN TRADICIONAL CON EMAIL Y PASSWORD
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const correo = document.getElementById("email").value;
                const contrasena = document.getElementById("password").value;

                showMessage("Validando credenciales...", "bg-blue-100 text-blue-700");

                try {
                    const res = await fetch(LOGIN_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ correo, contrasena })
                    });

                    const data = await res.json();

                    if (res.ok) {
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('token', data.token);
                localStorage.setItem('usuarioId', data.usuarioId);
                localStorage.setItem('correoUsuario', data.correo);
                        
                        showMessage("Redirigiendo al descubrir...", "bg-green-100 text-green-700");

                        setTimeout(() => {
                            window.location.href = "Descubrir.html"; 
                        }, 1000); 

                    } else {
                        showMessage("Error: " + (data.error || "Error de Descubrir de sesión"), "bg-red-100 text-red-700");
                    }

                } catch (error) {
                    console.error("Error al conectar con el backend:", error);
                    showMessage("Error de conexión con el servidor.", "bg-yellow-100 text-yellow-700");
                }
            });
            
            // LOGIN CON GOOGLE (SIN FIREBASE - USANDO BACKEND)
            const googleBtn = document.getElementById("google-login-btn");
            if (googleBtn) {
                googleBtn.addEventListener("click", () => {
                    console.log("Click en Google login");
                    showMessage("Redirigiendo a Google...", "bg-blue-100 text-blue-700");
                    // Redirigir al endpoint del backend
                    window.location.href = 'http://localhost:3001/api/auth/google';
                });
            }
        });
    </script>

    
</body>
</html>
