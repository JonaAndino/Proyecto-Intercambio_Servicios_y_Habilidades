<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='none' stroke='%232563EB' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>" type="image/svg+xml">

    <title>SkillConnect - Registro de Usuario</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, FacebookAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDHPaGaZIoa8fJA1Z4LTDdU7rTaYekNk1E",
            authDomain: "mi-portafolio-main.firebaseapp.com",
            projectId: "mi-portafolio-main",
            storageBucket: "mi-portafolio-main.firebasestorage.app",
            messagingSenderId: "630198308201",
            appId: "1:630198308201:web:17f7bfa9ea93e1aec541f8",
            measurementId: "G-Y4785PMVB2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        console.log("🔥 Firebase inicializado correctamente");
        
        // Variable para evitar procesar múltiples veces
        let yaProcesoUsuario = false;
        
        // Listener de cambios de estado de autenticación (MÁS CONFIABLE)
        auth.onAuthStateChanged((user) => {
            console.log("🔔 onAuthStateChanged disparado");
            console.log("   - yaProcesoUsuario:", yaProcesoUsuario);
            
            if (user && !yaProcesoUsuario) {
                console.log("✅ Usuario autenticado detectado:");
                console.log("   - Email:", user.email);
                console.log("   - UID:", user.uid);
                console.log("   - Display Name:", user.displayName);
                console.log("   - Photo URL:", user.photoURL);
                
                // Marcar como procesado
                yaProcesoUsuario = true;
                
                // Verificar si acabamos de volver de un redirect
                const urlParams = new URLSearchParams(window.location.search);
                const fromFirebase = sessionStorage.getItem('firebaseRedirect');
                
                console.log("   - URL tiene parámetros?:", window.location.search);
                console.log("   - sessionStorage firebaseRedirect:", fromFirebase);
                
                if (fromFirebase === 'true') {
                    console.log("� Usuario viene de redirect de Firebase, procesando...");
                    sessionStorage.removeItem('firebaseRedirect');
                    registrarConFirebase(user);
                } else {
                    console.log("ℹ️ Usuario ya estaba autenticado (no es nuevo redirect)");
                }
            } else if (!user) {
                console.log("👤 No hay usuario autenticado");
                yaProcesoUsuario = false;
            } else {
                console.log("ℹ️ Usuario ya fue procesado anteriormente");
            }
        });
        
        // Función para registrar con Firebase y enviar al backend
        async function registrarConFirebase(user) {
            try {
                const email = user.email;
                const displayName = user.displayName || 'Usuario de Firebase';
                
                console.log("🔐 Iniciando registro Firebase para:", email);
                
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = `Registrando a ${displayName}...`;
                mensajeDiv.className = '';
                
                const url = 'http://localhost:3001/api/registro';
                
                // Registrar en el backend usando el correo como contraseña
                console.log("📝 Enviando POST a /api/registro con:", { correo: email, contrasena: email });
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        correo: email, 
                        contrasena: email  // Usar correo como contraseña
                    })
                });

                const data = await response.json();
                console.log("📋 Respuesta del backend:", response.status, data);

                if (response.status === 201) {
                    console.log("✅ Usuario registrado correctamente");
                    mensajeDiv.textContent = '✓ Registro exitoso con Firebase. Redirigiendo...';
                    mensajeDiv.className = 'success';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else if (response.status === 409) {
                    console.log("ℹ️ Usuario ya existe, redirigiendo a login");
                    mensajeDiv.textContent = 'Ya tienes cuenta. Redirigiendo a login...';
                    mensajeDiv.className = 'success';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(data.mensaje || 'Error al registrar');
                }

            } catch (error) {
                console.error('❌ Error en registro Firebase:', error);
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Error: ' + error.message;
                mensajeDiv.className = 'error';
            }
        }
        
        // Exponer funciones para los botones
        window.registrarConGoogle = () => {
            try {
                console.log("🔵 Click en botón de Google");
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Redirigiendo a Google...';
                mensajeDiv.className = '';
                
                // Marcar que vamos a hacer un redirect
                sessionStorage.setItem('firebaseRedirect', 'true');
                console.log("✅ Marcado firebaseRedirect en sessionStorage");
                
                const provider = new GoogleAuthProvider();
                signInWithRedirect(auth, provider);
            } catch (error) {
                console.error('❌ Error al registrar con Google:', error);
                sessionStorage.removeItem('firebaseRedirect');
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Error con Google: ' + error.message;
                mensajeDiv.className = 'error';
            }
        };
        
        window.registrarConFacebook = () => {
            try {
                console.log("🔵 Click en botón de Facebook");
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Redirigiendo a Facebook...';
                mensajeDiv.className = '';
                
                // Marcar que vamos a hacer un redirect
                sessionStorage.setItem('firebaseRedirect', 'true');
                console.log("✅ Marcado firebaseRedirect en sessionStorage");
                
                const provider = new FacebookAuthProvider();
                signInWithRedirect(auth, provider);
            } catch (error) {
                console.error('❌ Error al registrar con Facebook:', error);
                sessionStorage.removeItem('firebaseRedirect');
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Error con Facebook: ' + error.message;
                mensajeDiv.className = 'error';
            }
        };
    </script>
    <style>
        /* CSS para estilizar el formulario */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            
            /* ****************************************************** */
            /* AJUSTE CLAVE: IMAGEN DE FONDO */
            background-image: url('trabajo.jpg'); 
            background-size: cover; /* Cubre toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantiene la imagen fija al desplazarse (opcional, pero se ve bien) */
            /* ****************************************************** */
            
            overflow: hidden; /* Evita barras de desplazamiento */
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95); /* Blanco con 95% de opacidad para ver un poco el fondo */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4); /* Sombra más fuerte para contraste */
            width: 350px;
            text-align: center;
            z-index: 10;
        }
        
        /* Estilo para la imagen del Logo */
        .logo-img {
            /* Usamos tx.jpeg según tu última verificación de archivos */
            width: 100%; 
            max-width: 200px; /* Reducido un poco para que no domine tanto */
            height: auto;
            margin-bottom: 20px;
        }
        
        /* Estilo del contenedor del logo/texto */
        .logo-text {
            margin-bottom: 0px; 
        }
        
        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8em; 
        }
        /* ... El resto de los estilos se mantienen sin cambios ... */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #6a85b6;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #6a85b6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover {
            background-color: #4a5a7b;
            transform: translateY(-2px);
        }
        
        /* Botones de redes sociales */
        .social-button {
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .social-button:hover {
            background-color: #f5f5f5;
            border-color: #6a85b6;
            transform: translateY(-2px);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        
        .divider span {
            padding: 0 10px;
            color: #666;
            font-size: 14px;
        }
        
        #mensaje {
            margin-top: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            color: #155724;
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">
            <img 
                src="tx.jpeg" 
                alt="SkillConnect Logo" 
                class="logo-img"
            >
        </div>
        
        <h1>Crear Cuenta</h1>
        <form id="registroForm">
            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" required>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" required>
            </div>
            <button type="submit">Registrarse</button>
        </form>
        
        <div class="divider">
            <span>o regístrate con</span>
        </div>
        
        <!-- Botones de autenticación social -->
        <button id="google-registro-btn" type="button" class="social-button">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
        </button>
        
        <div id="mensaje"></div>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="login.html" style="color: #6a85b6; text-decoration: none; font-size: 14px;">
                ¿Ya tienes cuenta? Inicia sesión aquí
            </a>
        </div>
    </div>

    <script>
        // AL CARGAR LA PÁGINA: Verificar si viene de autenticación con Google
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userId = urlParams.get('userId');
            const email = urlParams.get('email');
            const source = urlParams.get('source');
            
            const mensajeDiv = document.getElementById('mensaje');
            
            if (token && userId && email && source === 'google') {
                console.log("Autenticación con Google exitosa");
                console.log("   - Email:", email);
                console.log("   - User ID:", userId);
                
                // Guardar en localStorage
                localStorage.setItem('authToken', token);
                localStorage.setItem('usuarioId', userId);
                localStorage.setItem('correoUsuario', email);
                localStorage.setItem('firebaseUser', 'true');
                
                mensajeDiv.textContent = "Registro con Google exitoso. Redirigiendo...";
                mensajeDiv.classList.add('success');
                
                // Limpiar URL y redirigir
                setTimeout(() => {
                    window.location.href = "Dashboard.html";
                }, 1500);
                
                return; // No continuar con el resto del código
            }
            
            // Verificar si hay error en la autenticación
            const error = urlParams.get('error');
            if (error) {
                if (error === 'auth_failed') {
                    mensajeDiv.textContent = "Error: Autenticación fallida";
                    mensajeDiv.classList.add('error');
                } else if (error === 'server_error') {
                    mensajeDiv.textContent = "Error del servidor";
                    mensajeDiv.classList.add('error');
                }
            }
        });
        
        // REGISTRO TRADICIONAL CON EMAIL Y PASSWORD
        document.getElementById('registroForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const correo = document.getElementById('correo').value;
            const contrasena = document.getElementById('contrasena').value;
            const mensajeDiv = document.getElementById('mensaje');

            mensajeDiv.textContent = '';
            mensajeDiv.className = '';

            try {
                const url = 'http://localhost:3001/api/registro'; 
                
                console.log("Registro tradicional para:", correo);
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ correo, contrasena })
                });

                const data = await response.json();

                if (response.status === 201) {
                    mensajeDiv.textContent = 'Registro Exitoso: ' + data.mensaje;
                    mensajeDiv.classList.add('success');
                    document.getElementById('registroForm').reset();
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    
                } else if (response.status === 409) {
                    mensajeDiv.textContent = 'Error: Este correo ya está registrado.';
                    mensajeDiv.classList.add('error');

                } else {
                    mensajeDiv.textContent = 'Error del servidor: ' + data.mensaje || 'Intente de nuevo.';
                    mensajeDiv.classList.add('error');
                }

            } catch (error) {
                console.error('Error al conectar con el backend:', error);
                mensajeDiv.textContent = 'Error de conexión. Asegúrate que el Backend esté activo.';
                mensajeDiv.classList.add('error');
            }
        });
        
        // REGISTRO CON GOOGLE (SIN FIREBASE - USANDO BACKEND)
        const googleBtn = document.getElementById("google-registro-btn");
        if (googleBtn) {
            googleBtn.addEventListener("click", () => {
                console.log("Click en Continuar con Google");
                const mensajeDiv = document.getElementById('mensaje');
                mensajeDiv.textContent = 'Redirigiendo a Google...';
                mensajeDiv.className = '';
                // Redirigir al endpoint del backend
                window.location.href = 'http://localhost:3001/api/auth/google';
            });
        }
    </script>
</body>
</html>
