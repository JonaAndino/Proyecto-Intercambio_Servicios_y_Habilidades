<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes - SkillConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconify para iconos -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }

        /* Scrollbar personalizado */
        #message-container::-webkit-scrollbar,
        .contact-list::-webkit-scrollbar {
            width: 6px;
        }

        #message-container::-webkit-scrollbar-track,
        .contact-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        #message-container::-webkit-scrollbar-thumb,
        .contact-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        #message-container::-webkit-scrollbar-thumb:hover,
        .contact-list::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animaciones */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-sent {
            animation: slideInRight 0.3s ease-out;
        }

        .message-received {
            animation: slideInLeft 0.3s ease-out;
        }

        /* Indicador de escritura */
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Badge de notificaciones */
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid white;
        }

        /* Hover en contactos */
        .contact-item {
            transition: all 0.2s ease;
        }

        .contact-item:hover {
            background: #f8fafc;
            transform: translateX(4px);
        }

        .contact-item.active {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
            border-left: 4px solid #7c3aed;
        }

        /* Mensaje hover effect */
        .message-bubble {
            transition: transform 0.2s ease;
        }

        .message-bubble:hover {
            transform: scale(1.02);
        }

        /* Estado online */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .status-online {
            background: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .status-offline {
            background: #9ca3af;
        }
    </style>
</head>
<body class="min-h-screen antialiased">

    <!-- Contenedor Principal con Diseño SkillConnect -->
    <div class="flex flex-col h-screen max-w-7xl mx-auto">
        
        <!-- Header Superior -->
        <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="Dashboard.html" class="text-blue-600 hover:text-blue-700 transition">
                        <span class="iconify" data-icon="mdi:arrow-left" data-width="24"></span>
                    </a>
                    <div class="flex items-center space-x-2">
                        <span class="iconify text-blue-600" data-icon="mdi:message-text" data-width="28"></span>
                        <h1 class="text-2xl font-bold text-gray-800">Mensajes</h1>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button class="relative p-2 text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-full transition">
                        <span class="iconify" data-icon="mdi:bell" data-width="24"></span>
                        <span class="notification-badge">3</span>
                    </button>
                    <button class="p-2 text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-full transition">
                        <span class="iconify" data-icon="mdi:magnify" data-width="24"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Contenedor de Chat -->
        <div class="flex flex-1 overflow-hidden bg-white shadow-xl rounded-lg m-4">
            
            <!-- Panel Izquierdo: Lista de Contactos -->
            <!-- Panel Izquierdo: Lista de Contactos -->
            <aside class="w-full md:w-1/3 border-r border-gray-200 bg-gradient-to-b from-gray-50 to-white flex flex-col">
                
                <!-- Buscar Conversaciones -->
                <div class="p-4 border-b border-gray-200">
                    <div class="relative">
                        <span class="iconify absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" data-icon="mdi:magnify" data-width="20"></span>
                        <input 
                            type="text" 
                            placeholder="Buscar conversaciones..."
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        >
                    </div>
                </div>

                <!-- Lista de Contactos -->
                <div id="contact-list" class="contact-list flex-1 overflow-y-auto">
                    <!-- Se cargarán dinámicamente -->
                    <div class="flex items-center justify-center h-full text-gray-400">
                        <div class="text-center">
                            <span class="iconify mb-2" data-icon="mdi:message-outline" data-width="48"></span>
                            <p class="text-sm">Cargando conversaciones...</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Panel Derecho: Conversación -->
            <main id="chat-panel" class="flex-1 flex flex-col bg-white">
                
                <!-- Estado inicial: Sin conversación seleccionada -->
                <div id="no-chat-selected" class="flex-1 flex items-center justify-center text-gray-400">
                    <div class="text-center">
                        <span class="iconify mb-4" data-icon="mdi:message-text-outline" data-width="80"></span>
                        <h3 class="text-xl font-semibold text-gray-600 mb-2">Selecciona una conversación</h3>
                        <p class="text-sm">Elige un contacto para empezar a chatear</p>
                    </div>
                </div>

                <!-- Chat activo (oculto por defecto) -->
                <div id="active-chat" class="flex-1 flex-col hidden">
                    <!-- Header de Conversación -->
                    <header id="chat-header" class="p-4 border-b border-gray-200 bg-gradient-to-r from-blue-50 to-purple-50">
                        <!-- Se llenará dinámicamente -->
                    </header>

                    <!-- Área de Mensajes -->
                    <div id="message-container" class="flex-1 p-6 overflow-y-auto space-y-4 bg-gradient-to-b from-gray-50 to-white">
                        <!-- Se cargarán dinámicamente -->
                    </div>

                    <!-- Input de Mensaje -->
                    <footer class="p-4 border-t border-gray-200 bg-white">
                        <form id="chat-form" class="flex items-center space-x-3">
                            <button type="button" class="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition">
                                <span class="iconify" data-icon="mdi:emoticon-happy-outline" data-width="24"></span>
                            </button>
                            <button type="button" class="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition">
                                <span class="iconify" data-icon="mdi:attachment" data-width="24"></span>
                            </button>
                            <input 
                                type="text" 
                                id="message-input"
                                placeholder="Escribe un mensaje..."
                                required
                                class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition"
                            >
                            <button 
                                type="submit" 
                                class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-3 px-6 rounded-full transition duration-200 ease-in-out shadow-lg hover:shadow-xl transform hover:scale-105 flex items-center space-x-2"
                            >
                                <span class="iconify" data-icon="mdi:send" data-width="20"></span>
                                <span>Enviar</span>
                            </button>
                        </form>
                    </footer>
                </div>
            </main>

        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let currentUser = null;
        let currentConversation = null;
        let conversations = [];
        let refreshInterval = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await obtenerPersonaIdActual();
            await cargarConversaciones();
            
            // Actualizar mensajes cada 3 segundos si hay conversación activa
            refreshInterval = setInterval(() => {
                if (currentConversation) {
                    cargarMensajes(currentConversation.id_conversacion, false);
                }
            }, 3000);

            // Event listener para enviar mensajes
            const form = document.getElementById('chat-form');
            form.addEventListener('submit', enviarMensaje);
        });

        // Obtener ID de la persona actual
        async function obtenerPersonaIdActual() {
            try {
                const id_usuario = localStorage.getItem('id_usuario');
                if (!id_usuario) {
                    window.location.href = 'login.html';
                    return;
                }

                const response = await fetch(`${API_URL}/personas/by-usuario/${id_usuario}`);
                if (!response.ok) throw new Error('Error al obtener datos del usuario');
                
                const data = await response.json();
                currentUser = {
                    id_Perfil_Persona: data.id_Perfil_Persona,
                    nombre_Persona: data.nombre_Persona,
                    apellido_Persona: data.apellido_Persona,
                    imagenUrl_Persona: data.imagenUrl_Persona
                };
            } catch (error) {
                console.error('Error:', error);
                alert('Error al cargar datos del usuario');
            }
        }

        // Cargar lista de conversaciones
        async function cargarConversaciones() {
            try {
                const response = await fetch(`${API_URL}/mensajeria/conversaciones/${currentUser.id_Perfil_Persona}`);
                if (!response.ok) throw new Error('Error al cargar conversaciones');

                const resultado = await response.json();
                conversations = resultado.data || [];
                mostrarConversaciones(conversations);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('contact-list').innerHTML = `
                    <div class="flex items-center justify-center h-full text-gray-400">
                        <div class="text-center">
                            <span class="iconify mb-2" data-icon="mdi:alert-circle" data-width="48"></span>
                            <p class="text-sm">No tienes conversaciones activas</p>
                            <p class="text-xs mt-1">Acepta solicitudes de intercambio para chatear</p>
                        </div>
                    </div>
                `;
            }
        }

        // Mostrar conversaciones en la lista
        function mostrarConversaciones(conversaciones) {
            const container = document.getElementById('contact-list');
            
            if (!conversaciones || conversaciones.length === 0) {
                container.innerHTML = `
                    <div class="flex items-center justify-center h-full text-gray-400">
                        <div class="text-center p-6">
                            <span class="iconify mb-2" data-icon="mdi:message-outline" data-width="48"></span>
                            <p class="text-sm">No tienes conversaciones activas</p>
                            <p class="text-xs mt-1">Acepta solicitudes de intercambio para chatear</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = conversaciones.map(conv => {
                const initials = getInitials(conv.nombre_contacto);
                const colorClass = getColorClass(conv.id_conversacion);
                const mensajesNoLeidos = conv.mensajes_no_leidos || 0;
                
                return `
                    <div class="contact-item p-4 flex items-center space-x-3 cursor-pointer border-b border-gray-100"
                         onclick="seleccionarConversacion(${conv.id_conversacion})">
                        <div class="relative flex-shrink-0">
                            ${conv.imagenUrl_contacto ? 
                                `<img src="${conv.imagenUrl_contacto}" class="w-12 h-12 rounded-full object-cover shadow-md" alt="${conv.nombre_contacto}">` :
                                `<div class="w-12 h-12 bg-gradient-to-br ${colorClass} rounded-full flex items-center justify-center text-white font-bold shadow-md">
                                    ${initials}
                                </div>`
                            }
                            ${mensajesNoLeidos > 0 ? `<span class="notification-badge">${mensajesNoLeidos}</span>` : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between">
                                <p class="text-sm font-semibold text-gray-900 truncate">${conv.nombre_contacto}</p>
                                <span class="text-xs text-gray-500">${formatearFecha(conv.fecha_ultimo_mensaje)}</span>
                            </div>
                            <p class="text-xs text-gray-600 truncate mt-1">${conv.ultimo_mensaje || 'Sin mensajes aún'}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Seleccionar conversación
        async function seleccionarConversacion(idConversacion) {
            currentConversation = conversations.find(c => c.id_conversacion === idConversacion);
            
            if (!currentConversation) return;

            // Marcar como activa visualmente
            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Mostrar panel de chat
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('active-chat').classList.add('flex');

            // Actualizar header del chat
            actualizarHeaderChat(currentConversation);

            // Cargar mensajes
            await cargarMensajes(idConversacion, true);
        }

        // Actualizar header del chat
        function actualizarHeaderChat(conv) {
            const initials = getInitials(conv.nombre_contacto);
            const colorClass = getColorClass(conv.id_conversacion);
            
            document.getElementById('chat-header').innerHTML = `
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="relative">
                            ${conv.imagenUrl_contacto ? 
                                `<img src="${conv.imagenUrl_contacto}" 
                                     class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-lg" 
                                     alt="${conv.nombre_contacto}"
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                 <div class="w-12 h-12 bg-gradient-to-br ${colorClass} rounded-full items-center justify-center text-white font-bold shadow-lg hidden">
                                    ${initials}
                                 </div>` :
                                `<div class="w-12 h-12 bg-gradient-to-br ${colorClass} rounded-full flex items-center justify-center text-white font-bold shadow-lg">
                                    ${initials}
                                </div>`
                            }
                        </div>
                        <div>
                            <h2 class="text-base font-bold text-gray-800">${conv.nombre_contacto}</h2>
                            <p class="text-xs text-green-600 flex items-center">
                                <span class="w-2 h-2 bg-green-500 rounded-full mr-1"></span>
                                Activo en SkillConnect
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button class="px-4 py-2 text-sm font-semibold text-blue-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition flex items-center space-x-1">
                            <span class="iconify" data-icon="mdi:account" data-width="18"></span>
                            <span>Ver Perfil</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // Cargar mensajes
        async function cargarMensajes(idConversacion, scrollToEnd = true) {
            try {
                const response = await fetch(`${API_URL}/mensajeria/conversacion/${idConversacion}/mensajes?personaId=${currentUser.id_Perfil_Persona}`);
                if (!response.ok) throw new Error('Error al cargar mensajes');

                const resultado = await response.json();
                const mensajes = resultado.data || [];
                mostrarMensajes(mensajes);

                if (scrollToEnd) {
                    scrollToBottom();
                }

                // Marcar mensajes como leídos
                await fetch(`${API_URL}/mensajeria/conversacion/${idConversacion}/marcar-leidos`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ personaId: currentUser.id_Perfil_Persona })
                });

                // Actualizar badge en la lista
                await cargarConversaciones();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Mostrar mensajes en el chat
        function mostrarMensajes(mensajes) {
            const container = document.getElementById('message-container');
            
            if (!mensajes || mensajes.length === 0) {
                container.innerHTML = `
                    <div class="flex items-center justify-center h-full text-gray-400">
                        <p class="text-sm">No hay mensajes aún. ¡Envía el primero!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = mensajes.map(msg => {
                const esMio = msg.id_persona_envia === currentUser.id_Perfil_Persona;
                const initials = getInitials(msg.nombre_remitente);
                const colorClass = getColorClass(msg.id_persona_envia);
                
                if (esMio) {
                    return `
                        <div class="flex justify-end message-sent">
                            <div class="flex items-end space-x-2 max-w-md">
                                <div>
                                    <div class="message-bubble bg-gradient-to-br from-blue-600 to-purple-600 text-white p-4 rounded-2xl rounded-br-none shadow-lg">
                                        <p class="text-sm">${msg.contenido}</p>
                                    </div>
                                    <span class="block text-xs text-gray-500 mt-1 mr-2 text-right">${formatearHora(msg.fecha_envio)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="flex justify-start message-received">
                            <div class="flex items-end space-x-2 max-w-md">
                                ${msg.imagenUrl_remitente ? 
                                    `<img src="${msg.imagenUrl_remitente}" class="w-8 h-8 rounded-full object-cover flex-shrink-0" alt="${msg.nombre_remitente}">` :
                                    `<div class="w-8 h-8 bg-gradient-to-br ${colorClass} rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
                                        ${initials}
                                    </div>`
                                }
                                <div>
                                    <div class="message-bubble bg-white p-4 rounded-2xl rounded-bl-none shadow-md border border-gray-100">
                                        <p class="text-sm text-gray-800">${msg.contenido}</p>
                                    </div>
                                    <span class="block text-xs text-gray-500 mt-1 ml-2">${formatearHora(msg.fecha_envio)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        // Enviar mensaje
        async function enviarMensaje(e) {
            e.preventDefault();
            
            const input = document.getElementById('message-input');
            const contenido = input.value.trim();

            if (!contenido || !currentConversation) return;

            try {
                const response = await fetch(`${API_URL}/mensajeria/enviar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversacionId: currentConversation.id_conversacion,
                        personaEnviaId: currentUser.id_Perfil_Persona,
                        contenido: contenido
                    })
                });

                if (!response.ok) throw new Error('Error al enviar mensaje');

                input.value = '';
                await cargarMensajes(currentConversation.id_conversacion, true);
            } catch (error) {
                console.error('Error:', error);
                alert('Error al enviar el mensaje');
            }
        }

        // Utilidades
        function getInitials(nombre) {
            if (!nombre) return '??';
            const parts = nombre.split(' ');
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return nombre.substring(0, 2).toUpperCase();
        }

        function getColorClass(id) {
            const colors = [
                'from-green-400 to-green-600',
                'from-blue-400 to-blue-600',
                'from-purple-400 to-purple-600',
                'from-amber-400 to-orange-500',
                'from-pink-400 to-pink-600',
                'from-indigo-400 to-indigo-600'
            ];
            return colors[id % colors.length];
        }

        function formatearFecha(fecha) {
            if (!fecha) return '';
            const date = new Date(fecha);
            const hoy = new Date();
            const ayer = new Date(hoy);
            ayer.setDate(ayer.getDate() - 1);

            if (date.toDateString() === hoy.toDateString()) {
                return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            } else if (date.toDateString() === ayer.toDateString()) {
                return 'Ayer';
            } else {
                return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
            }
        }

        function formatearHora(fecha) {
            if (!fecha) return '';
            return new Date(fecha).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            const container = document.getElementById('message-container');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        // Limpiar intervalo al salir
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>

    <!-- Protección de sesión -->
    <script src="js/auth-guard.js"></script>

</body>
</html>
