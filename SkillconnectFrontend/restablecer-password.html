<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - SkillConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='none' stroke='%232563EB' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>" type="image/svg+xml">

</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <!-- Loading State -->
        <div id="loading-state" class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-gray-600">Validando enlace...</p>
        </div>

        <!-- Invalid Token State -->
        <div id="invalid-state" style="display: none;" class="text-center">
            <div class="mx-auto w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Enlace Inválido o Expirado</h1>
            <p id="error-message" class="text-gray-600 mb-6">Este enlace ha expirado o no es válido.</p>
            <a href="recuperar-password.html" class="inline-flex items-center gap-2 py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition duration-150">
                Solicitar Nuevo Enlace
            </a>
        </div>

        <!-- Form State -->
        <div id="form-state" style="display: none;">
            <!-- Logo/Header -->
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-900">Nueva Contraseña</h1>
                <p class="text-gray-600 mt-2">Ingresa tu nueva contraseña para <span id="user-email" class="font-medium text-indigo-600"></span></p>
            </div>

            <!-- Message Box -->
            <div id="message-box" style="display: none;" class="mb-6"></div>

            <!-- Formulario -->
            <form id="restablecer-form" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Nueva Contraseña
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            minlength="6"
                            placeholder="Mínimo 6 caracteres"
                            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150"
                        >
                        <button 
                            type="button" 
                            id="toggle-password"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center"
                        >
                            <svg id="eye-icon" class="h-5 w-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="mt-1 text-sm text-gray-500">Debe tener al menos 6 caracteres</p>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">
                        Confirmar Contraseña
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            id="confirm-password" 
                            name="confirm-password"
                            required
                            minlength="6"
                            placeholder="Repite tu contraseña"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150"
                        >
                    </div>
                </div>

                <button 
                    type="submit" 
                    id="submit-btn"
                    class="w-full flex items-center justify-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-medium transition duration-150"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span id="btn-text">Restablecer Contraseña</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        let tokenFromURL = '';

        // Función para mostrar mensajes
        function showMessage(text, type) {
            const messageBox = document.getElementById("message-box");
            messageBox.style.display = "block";
            
            let classes = "p-4 rounded-lg text-sm font-medium ";
            if (type === 'success') {
                classes += "bg-green-100 text-green-700 border border-green-300";
            } else if (type === 'error') {
                classes += "bg-red-100 text-red-700 border border-red-300";
            } else if (type === 'info') {
                classes += "bg-blue-100 text-blue-700 border border-blue-300";
            }
            
            messageBox.className = classes;
            messageBox.textContent = text;
        }

        // Toggle mostrar/ocultar contraseña
        document.getElementById('toggle-password').addEventListener('click', () => {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });

        // Validar token al cargar la página
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                showInvalidState('No se proporcionó un token de recuperación.');
                return;
            }
            
            tokenFromURL = token;
            
            try {
                const response = await fetch('http://localhost:3001/api/password/validar-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Token válido, mostrar formulario
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('form-state').style.display = 'block';
                    document.getElementById('user-email').textContent = data.correo;
                } else {
                    showInvalidState(data.mensaje);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showInvalidState('Error de conexión con el servidor.');
            }
        });

        function showInvalidState(message) {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('invalid-state').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        // Manejar el envío del formulario
        document.getElementById('restablecer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validar que las contraseñas coincidan
            if (password !== confirmPassword) {
                showMessage('Las contraseñas no coinciden', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            
            // Deshabilitar botón mientras se procesa
            submitBtn.disabled = true;
            btnText.textContent = 'Restableciendo...';
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            try {
                const response = await fetch('http://localhost:3001/api/password/restablecer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: tokenFromURL,
                        nuevaPassword: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.mensaje, 'success');
                    
                    // Redirigir al login después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(data.mensaje || 'Error al restablecer la contraseña', 'error');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Restablecer Contraseña';
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión con el servidor.', 'error');
                submitBtn.disabled = false;
                btnText.textContent = 'Restablecer Contraseña';
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>

</body>
</html>
